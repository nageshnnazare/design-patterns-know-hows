<pre><code class="language-cpp">/*
 * CONSTANT FOLDING &amp; COMPILE-TIME OPTIMIZATIONS
 * 
 * DEFINITION:
 * Compiler evaluates constant expressions at compile time
 * rather than runtime, eliminating computation overhead.
 * 
 * TYPES:
 * 1. Constant Folding - Evaluate constant expressions
 * 2. Constant Propagation - Replace variables with constants
 * 3. Dead Code Elimination - Remove unreachable code
 * 4. constexpr - Guaranteed compile-time evaluation
 * 
 * BENEFITS:
 * + Zero runtime cost
 * + Smaller binaries
 * + Faster execution
 * + Better optimization opportunities
 */

#include &lt;iostream&gt;
#include &lt;array&gt;
#include &lt;cmath&gt;

using namespace std;

// ============= Example 1: Basic Constant Folding =============

void constantFoldingBasic() {
    cout &lt;&lt; &quot;\\n=== Basic Constant Folding ===&quot; &lt;&lt; endl;

    // Computed at compile time
    int a = 2 + 3;           // Becomes: int a = 5;
    int b = 10 * 20;         // Becomes: int b = 200;
    int c = (5 + 3) * 2;     // Becomes: int c = 16;

    cout &lt;&lt; &quot;a = &quot; &lt;&lt; a &lt;&lt; &quot; (computed at compile time)&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;b = &quot; &lt;&lt; b &lt;&lt; &quot; (computed at compile time)&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;c = &quot; &lt;&lt; c &lt;&lt; &quot; (computed at compile time)&quot; &lt;&lt; endl;
}

// ============= Example 2: Constant Propagation =============

void constantPropagation() {
    cout &lt;&lt; &quot;\\n=== Constant Propagation ===&quot; &lt;&lt; endl;

    const int x = 10;
    const int y = 20;

    // Compiler propagates constants and folds
    int result = x * y + x - y;  // Becomes: int result = 190;

    cout &lt;&lt; &quot;Result: &quot; &lt;&lt; result &lt;&lt; &quot; (all compile-time)&quot; &lt;&lt; endl;
}

// ============= Example 3: constexpr Functions =============

constexpr int factorial(int n) {
    return n &lt;= 1 ? 1 : n * factorial(n - 1);
}

constexpr double power(double base, int exp) {
    double result = 1.0;
    for (int i = 0; i &lt; exp; ++i) {
        result *= base;
    }
    return result;
}

constexpr int fibonacci(int n) {
    if (n &lt;= 1) return n;
    int a = 0, b = 1;
    for (int i = 2; i &lt;= n; ++i) {
        int temp = a + b;
        a = b;
        b = temp;
    }
    return b;
}

void constexprFunctions() {
    cout &lt;&lt; &quot;\\n=== constexpr Functions ===&quot; &lt;&lt; endl;

    // Computed at compile time!
    constexpr int fact5 = factorial(5);
    constexpr double pow2_10 = power(2, 10);
    constexpr int fib10 = fibonacci(10);

    cout &lt;&lt; &quot;5! = &quot; &lt;&lt; fact5 &lt;&lt; &quot; (compile-time)&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;2^10 = &quot; &lt;&lt; pow2_10 &lt;&lt; &quot; (compile-time)&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;fib(10) = &quot; &lt;&lt; fib10 &lt;&lt; &quot; (compile-time)&quot; &lt;&lt; endl;
}

// ============= Example 4: constexpr Arrays =============

constexpr array&lt;int, 10&gt; generateSquares() {
    array&lt;int, 10&gt; result{};
    for (int i = 0; i &lt; 10; ++i) {
        result[i] = i * i;
    }
    return result;
}

void constexprArrays() {
    cout &lt;&lt; &quot;\\n=== constexpr Arrays ===&quot; &lt;&lt; endl;

    // Array computed at compile time!
    constexpr auto squares = generateSquares();

    cout &lt;&lt; &quot;Squares (computed at compile time): &quot;;
    for (int sq : squares) {
        cout &lt;&lt; sq &lt;&lt; &quot; &quot;;
    }
    cout &lt;&lt; endl;
}

// ============= Example 5: Dead Code Elimination =============

void deadCodeElimination() {
    cout &lt;&lt; &quot;\\n=== Dead Code Elimination ===&quot; &lt;&lt; endl;

    const bool debug = false;

    if (debug) {
        // This entire block is eliminated at compile time!
        cout &lt;&lt; &quot;Debug info...&quot; &lt;&lt; endl;
        cout &lt;&lt; &quot;More debug...&quot; &lt;&lt; endl;
        // Expensive debug operations...
    }

    if constexpr (false) {  // C++17
        // Guaranteed to be eliminated
        cout &lt;&lt; &quot;Never compiled!&quot; &lt;&lt; endl;
    }

    cout &lt;&lt; &quot;Debug code removed by compiler&quot; &lt;&lt; endl;
}

// ============= Example 6: Template Metaprogramming =============

template &lt;int N&gt;
struct FactorialTemplate {
    static constexpr int value = N * FactorialTemplate&lt;N - 1&gt;::value;
};

template &lt;&gt;
struct FactorialTemplate&lt;0&gt; {
    static constexpr int value = 1;
};

void templateMetaprogramming() {
    cout &lt;&lt; &quot;\\n=== Template Metaprogramming ===&quot; &lt;&lt; endl;

    // Computed at compile time via templates
    constexpr int fact = FactorialTemplate&lt;5&gt;::value;
    cout &lt;&lt; &quot;5! = &quot; &lt;&lt; fact &lt;&lt; &quot; (template metaprogramming)&quot; &lt;&lt; endl;
}

// ============= Example 7: if constexpr (C++17) =============

template &lt;typename T&gt;
void processValue(T value) {
    if constexpr (is_integral_v&lt;T&gt;) {
        // Only compiled for integral types
        cout &lt;&lt; &quot;Integer: &quot; &lt;&lt; value &lt;&lt; endl;
    } else if constexpr (is_floating_point_v&lt;T&gt;) {
        // Only compiled for floating-point types
        cout &lt;&lt; &quot;Float: &quot; &lt;&lt; value &lt;&lt; endl;
    } else {
        // Only compiled for other types
        cout &lt;&lt; &quot;Other type&quot; &lt;&lt; endl;
    }
}

void ifConstexpr() {
    cout &lt;&lt; &quot;\\n=== if constexpr ===&quot; &lt;&lt; endl;

    processValue(42);     // Only integer branch compiled
    processValue(3.14);   // Only float branch compiled
    processValue(&quot;hi&quot;);   // Only other branch compiled
}

// ============= Example 8: Compile-Time String Processing =============

constexpr size_t constStrlen(const char* str) {
    size_t len = 0;
    while (str[len] != '\\0') {
        ++len;
    }
    return len;
}

constexpr bool constStrEqual(const char* a, const char* b) {
    while (*a &amp;&amp; *b) {
        if (*a != *b) return false;
        ++a;
        ++b;
    }
    return *a == *b;
}

void compileTimeStrings() {
    cout &lt;&lt; &quot;\\n=== Compile-Time String Processing ===&quot; &lt;&lt; endl;

    constexpr size_t len = constStrlen(&quot;Hello, World!&quot;);
    constexpr bool equal = constStrEqual(&quot;test&quot;, &quot;test&quot;);

    cout &lt;&lt; &quot;Length: &quot; &lt;&lt; len &lt;&lt; &quot; (compile-time)&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Equal: &quot; &lt;&lt; (equal ? &quot;yes&quot; : &quot;no&quot;) &lt;&lt; &quot; (compile-time)&quot; &lt;&lt; endl;
}

// ============= Example 9: Strength Reduction =============

void strengthReduction() {
    cout &lt;&lt; &quot;\\n=== Strength Reduction ===&quot; &lt;&lt; endl;

    // Compiler replaces expensive operations with cheaper ones

    int x = 100;

    // x * 2 becomes x + x or x &lt;&lt; 1
    int a = x * 2;

    // x / 2 becomes x &gt;&gt; 1 (for unsigned)
    unsigned int b = x / 2;

    // x * 8 becomes x &lt;&lt; 3
    int c = x * 8;

    cout &lt;&lt; &quot;All optimized by compiler (multiplication → shifts)&quot; &lt;&lt; endl;
}

// ============= Example 10: Algebraic Simplification =============

void algebraicSimplification() {
    cout &lt;&lt; &quot;\\n=== Algebraic Simplification ===&quot; &lt;&lt; endl;

    int x = 42;

    // x + 0 → x
    int a = x + 0;  // Becomes: int a = x;

    // x * 1 → x
    int b = x * 1;  // Becomes: int b = x;

    // x * 0 → 0
    int c = x * 0;  // Becomes: int c = 0;

    // x - x → 0
    int d = x - x;  // Becomes: int d = 0;

    cout &lt;&lt; &quot;Compiler simplifies algebraic expressions&quot; &lt;&lt; endl;
}

<pre><code class="language-cpp">/*
 * TAIL CALL OPTIMIZATION (TCO)
 * Also known as: Tail Call Elimination
 * 
 * DEFINITION:
 * When a function's last operation is calling another function,
 * the compiler can reuse the current stack frame instead of creating a new one.
 * 
 * PURPOSE:
 * - Prevent stack overflow in recursive functions
 * - Convert recursion to iteration
 * - Enable functional programming patterns
 * 
 * REQUIREMENTS:
 * - Function call must be in tail position
 * - No operations after the call
 * - Return the result directly
 * 
 * BENEFITS:
 * + Constant stack space (O(1) instead of O(n))
 * + Prevents stack overflow
 * + Similar performance to iteration
 */

#include &lt;iostream&gt;
#include &lt;chrono&gt;

using namespace std;
using namespace chrono;

// ============= Example 1: Factorial - Bad (Not Tail Recursive) =============

// NOT tail recursive - multiplication happens after recursive call
int factorialNonTail(int n) {
    if (n &lt;= 1) return 1;
    return n * factorialNonTail(n - 1);  // Operation AFTER recursive call
    // Stack: fact(5) waits for fact(4) waits for fact(3)...
}

// Tail recursive - accumulator pattern
int factorialTail(int n, int accumulator = 1) {
    if (n &lt;= 1) return accumulator;
    return factorialTail(n - 1, n * accumulator);  // Last operation is call
    // Compiler can reuse stack frame!
}

// Iterative equivalent (what TCO generates)
int factorialIterative(int n) {
    int result = 1;
    while (n &gt; 1) {
        result *= n;
        n--;
    }
    return result;
}

// ============= Example 2: Fibonacci - Tail Recursive =============

// Non-tail recursive (two recursive calls)
int fibonacciNonTail(int n) {
    if (n &lt;= 1) return n;
    return fibonacciNonTail(n - 1) + fibonacciNonTail(n - 2);
    // NOT tail recursive - addition after calls
}

// Tail recursive version
int fibonacciTail(int n, int a = 0, int b = 1) {
    if (n == 0) return a;
    if (n == 1) return b;
    return fibonacciTail(n - 1, b, a + b);  // Tail call!
}

// ============= Example 3: Sum List - Tail Recursive =============

struct Node {
    int value;
    Node* next;
    Node(int v, Node* n = nullptr) : value(v), next(n) {}
};

// Non-tail recursive
int sumListNonTail(Node* node) {
    if (!node) return 0;
    return node-&gt;value + sumListNonTail(node-&gt;next);  // NOT tail recursive
}

// Tail recursive
int sumListTail(Node* node, int accumulator = 0) {
    if (!node) return accumulator;
    return sumListTail(node-&gt;next, accumulator + node-&gt;value);  // Tail call!
}

// ============= Example 4: GCD - Naturally Tail Recursive =============

int gcdNonOptimized(int a, int b) {
    if (b == 0) return a;
    return gcdNonOptimized(b, a % b);  // Perfect tail call!
}

// ============= Example 5: Power Function =============

// Non-tail recursive
double powerNonTail(double base, int exp) {
    if (exp == 0) return 1;
    return base * powerNonTail(base, exp - 1);  // NOT tail
}

// Tail recursive
double powerTail(double base, int exp, double accumulator = 1) {
    if (exp == 0) return accumulator;
    return powerTail(base, exp - 1, base * accumulator);  // Tail call!
}

// ============= Example 6: Mutual Recursion =============

bool isEven(int n);
bool isOdd(int n);

bool isEven(int n) {
    if (n == 0) return true;
    return isOdd(n - 1);  // Tail call to isOdd
}

bool isOdd(int n) {
    if (n == 0) return false;
    return isEven(n - 1);  // Tail call to isEven
}

// ============= Performance Test =============

void performanceTest() {
    cout &lt;&lt; &quot;\\n=== Performance Comparison ===&quot; &lt;&lt; endl;

    const int n = 10000;

    // Tail recursive (optimized to iteration)
    auto start1 = high_resolution_clock::now();
    int result1 = factorialTail(n);
    auto end1 = high_resolution_clock::now();
    auto duration1 = duration_cast&lt;microseconds&gt;(end1 - start1).count();

    // Iterative
    auto start2 = high_resolution_clock::now();
    int result2 = factorialIterative(n);
    auto end2 = high_resolution_clock::now();
    auto duration2 = duration_cast&lt;microseconds&gt;(end2 - start2).count();

    cout &lt;&lt; &quot;Tail recursive (with TCO): &quot; &lt;&lt; duration1 &lt;&lt; &quot; μs&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Iterative:                 &quot; &lt;&lt; duration2 &lt;&lt; &quot; μs&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;Performance similar - TCO converts recursion to iteration!&quot; &lt;&lt; endl;

    // Note: Cannot test non-tail for large n - would stack overflow!
}

// ============= Example 7: When TCO Doesn't Apply =============

int notTailRecursive1(int n) {
    if (n &lt;= 0) return 0;
    int result = notTailRecursive1(n - 1);
    return result + 1;  // Operation AFTER recursive call
}

int notTailRecursive2(int n) {
    if (n &lt;= 0) return 0;
    notTailRecursive2(n - 1);
    cout &lt;&lt; n &lt;&lt; &quot; &quot;;  // Statement after call
    return n;
}

    cout &lt;&lt; &quot;With TCO: jmp instruction (reuse stack frame)&quot; &lt;&lt; endl;
}

    cout &lt;&lt; &quot;=============&quot; &lt;&lt; endl;

<h2 id="-other-important-optimizations">📋 Other Important Optimizations</h2>
<h3 id="common-subexpression-elimination-cse"><strong>Common Subexpression Elimination (CSE)</strong></h3>
<ul>
<li><strong>What</strong>: Reuse computed values instead of recomputing</li>
<li><strong>Example</strong>: <code>a*b + a*b</code> → <code>temp = a*b; temp + temp</code></li>
<li><strong>Impact</strong>: Reduces redundant computations</li>
<li><strong>Automatic</strong>: Yes, at -O2+</li>
</ul>
<h3 id="dead-store-elimination"><strong>Dead Store Elimination</strong></h3>
<ul>
<li><strong>What</strong>: Removes writes to variables that are never read</li>
<li><strong>Example</strong>: <code>int x = 5; x = 10; return x;</code> → <code>return 10;</code></li>
<li><strong>Impact</strong>: Reduces memory writes</li>
<li><strong>Automatic</strong>: Yes</li>
</ul>
<h3 id="branch-prediction-optimization"><strong>Branch Prediction Optimization</strong></h3>
<ul>
<li><strong>What</strong>: Compiler arranges code for better branch prediction</li>
<li><strong>Techniques</strong>:</li>
<li>Likely/unlikely hints (<code>[[likely]]</code>, <code>[[unlikely]]</code> C++20)</li>
<li>Profile-guided optimization</li>
<li>Predicated execution</li>
<li><strong>Impact</strong>: Reduces pipeline stalls</li>
<li><strong>Hints</strong>: <code>__builtin_expect(cond, 1)</code> for GCC/Clang</li>
</ul>
<h3 id="register-allocation"><strong>Register Allocation</strong></h3>
<ul>
<li><strong>What</strong>: Keeps frequently used variables in CPU registers</li>
<li><strong>Impact</strong>: 10-100x faster than RAM access</li>
<li><strong>Automatic</strong>: Yes, very sophisticated</li>
<li><strong>Levels</strong>: Local, global, inter-procedural</li>
</ul>
<h3 id="instruction-scheduling"><strong>Instruction Scheduling</strong></h3>
<ul>
<li><strong>What</strong>: Reorder instructions to minimize CPU stalls</li>
<li><strong>Impact</strong>: Better CPU pipeline utilization</li>
<li><strong>Automatic</strong>: Yes</li>
<li><strong>Considers</strong>: Instruction latency, dependencies</li>
</ul>
<h3 id="auto-vectorization-part-of-loop-opts"><strong>Auto-Vectorization</strong> (Part of Loop Opts)</h3>
<ul>
<li><strong>What</strong>: Use SIMD instructions (SSE, AVX) automatically</li>
<li><strong>Impact</strong>: 2-8x speedup for suitable code</li>
<li><strong>Requirements</strong>: Contiguous data, no dependencies</li>
<li><strong>Flags</strong>: <code>-march=native</code>, <code>-ftree-vectorize</code></li>
</ul>
<h3 id="link-time-optimization-lto"><strong>Link-Time Optimization (LTO)</strong></h3>
<ul>
<li><strong>What</strong>: Optimize across translation units</li>
<li><strong>Impact</strong>: 5-15% overall improvement</li>
<li><strong>What it enables</strong>:</li>
<li>Cross-file inlining</li>
<li>Better devirtualization</li>
<li>Dead code elimination across files</li>
<li><strong>Flag</strong>: <code>-flto</code></li>
<li><strong>Tradeoff</strong>: Slower compilation</li>
</ul>
<h3 id="profile-guided-optimization-pgo"><strong>Profile-Guided Optimization (PGO)</strong></h3>
<ul>
<li><strong>What</strong>: Use runtime profiling to guide optimization</li>
<li><strong>Impact</strong>: 10-30% improvement</li>
<li><strong>Process</strong>:
  1. Compile with instrumentation: <code>-fprofile-generate</code>
  2. Run program with typical workload
  3. Recompile with profile: <code>-fprofile-use</code></li>
<li><strong>Benefits</strong>:</li>
<li>Better inlining decisions</li>
<li>Improved branch prediction</li>
<li>Hot/cold code separation</li>
</ul>
<h3 id="strength-reduction"><strong>Strength Reduction</strong></h3>
<ul>
<li><strong>What</strong>: Replace expensive operations with cheaper ones</li>
<li><strong>Examples</strong>:</li>
<li><code>x * 2</code> → <code>x + x</code> or <code>x &lt;&lt; 1</code></li>

 * BUILDER PATTERN - Creational Pattern
 * 
 * PURPOSE:
 * Separates the construction of a complex object from its representation,

    void setSize(const string&amp; s) { size = s; }

    unique_ptr&lt;Pizza&gt; build() {

    }
};

<pre><code class="language-cpp">/*
 * PROTOTYPE PATTERN - Creational Pattern
 * 
 * PURPOSE:
 * Creates new objects by copying existing objects (prototypes) rather than
 * creating new instances from scratch.
 * 
 * WHEN TO USE:
 * - Object creation is expensive (database queries, network calls, complex initialization)
 * - Want to avoid subclasses of an object creator
 * - Instances have only few different combinations of state
 * - Need to create objects that are similar to existing objects
 * 
 * PROS:
 * + Avoids expensive initialization
 * + Reduces subclassing
 * + Can add/remove objects at runtime
 * + Can specify new objects by varying values
 * + Reduces number of classes
 * 
 * CONS:
 * - Cloning complex objects with circular references can be tricky
 * - Deep copy vs shallow copy considerations
 * - Must implement clone() for all classes
 * 
 * REAL-WORLD EXAMPLES:
 * - Graphic editors (copying shapes/objects)
 * - Document templates
 * - Game objects (cloning enemies, items)
 * - Database record duplication
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;memory&gt;
#include &lt;unordered_map&gt;

using namespace std;

// ============= Example 1: Shape Cloning =============

// Prototype interface
class Shape {
protected:
    string type;
    int x, y;
    string color;

public:
    Shape() : x(0), y(0), color(&quot;white&quot;) {}
    Shape(const Shape&amp; source) {
        type = source.type;
        x = source.x;
        y = source.y;
        color = source.color;
    }

    virtual ~Shape() = default;

    // Pure virtual clone method
    virtual unique_ptr&lt;Shape&gt; clone() const = 0;
    virtual void draw() const = 0;

    void setPosition(int px, int py) { x = px; y = py; }
    void setColor(const string&amp; c) { color = c; }

    string getType() const { return type; }
};

// Concrete Prototype 1: Circle
class Circle : public Shape {
private:
    int radius;

public:
    Circle(int r) : radius(r) {
        type = &quot;Circle&quot;;
        cout &lt;&lt; &quot;Creating new Circle (expensive operation)...&quot; &lt;&lt; endl;
    }

    // Copy constructor
    Circle(const Circle&amp; source) : Shape(source) {
        radius = source.radius;
        cout &lt;&lt; &quot;Cloning Circle (fast operation)...&quot; &lt;&lt; endl;
    }

    unique_ptr&lt;Shape&gt; clone() const override {
        return make_unique&lt;Circle&gt;(*this);
    }

    void draw() const override {
        cout &lt;&lt; &quot;Drawing &quot; &lt;&lt; color &lt;&lt; &quot; Circle at (&quot; &lt;&lt; x &lt;&lt; &quot;,&quot; &lt;&lt; y 
             &lt;&lt; &quot;) with radius &quot; &lt;&lt; radius &lt;&lt; endl;
    }

    void setRadius(int r) { radius = r; }
};

// Concrete Prototype 2: Rectangle
class Rectangle : public Shape {
private:
    int width, height;

public:
    Rectangle(int w, int h) : width(w), height(h) {
        type = &quot;Rectangle&quot;;
        cout &lt;&lt; &quot;Creating new Rectangle (expensive operation)...&quot; &lt;&lt; endl;
    }

    Rectangle(const Rectangle&amp; source) : Shape(source) {
        width = source.width;
        height = source.height;
        cout &lt;&lt; &quot;Cloning Rectangle (fast operation)...&quot; &lt;&lt; endl;
    }

    unique_ptr&lt;Shape&gt; clone() const override {
        return make_unique&lt;Rectangle&gt;(*this);
    }

    void draw() const override {
        cout &lt;&lt; &quot;Drawing &quot; &lt;&lt; color &lt;&lt; &quot; Rectangle at (&quot; &lt;&lt; x &lt;&lt; &quot;,&quot; &lt;&lt; y 
             &lt;&lt; &quot;) with size &quot; &lt;&lt; width &lt;&lt; &quot;x&quot; &lt;&lt; height &lt;&lt; endl;
    }

    void setDimensions(int w, int h) { width = w; height = h; }
};

// Concrete Prototype 3: Triangle
class Triangle : public Shape {
private:
    int base, height;

public:
    Triangle(int b, int h) : base(b), height(h) {
        type = &quot;Triangle&quot;;
        cout &lt;&lt; &quot;Creating new Triangle (expensive operation)...&quot; &lt;&lt; endl;
    }

    Triangle(const Triangle&amp; source) : Shape(source) {
        base = source.base;
        height = source.height;
        cout &lt;&lt; &quot;Cloning Triangle (fast operation)...&quot; &lt;&lt; endl;
    }

    unique_ptr&lt;Shape&gt; clone() const override {
        return make_unique&lt;Triangle&gt;(*this);
    }

    void draw() const override {
        cout &lt;&lt; &quot;Drawing &quot; &lt;&lt; color &lt;&lt; &quot; Triangle at (&quot; &lt;&lt; x &lt;&lt; &quot;,&quot; &lt;&lt; y 
             &lt;&lt; &quot;) with base &quot; &lt;&lt; base &lt;&lt; &quot; and height &quot; &lt;&lt; height &lt;&lt; endl;
    }
};

// Prototype Registry/Manager
class ShapeRegistry {
private:
    unordered_map&lt;string, unique_ptr&lt;Shape&gt;&gt; prototypes;

public:
    void registerPrototype(const string&amp; key, unique_ptr&lt;Shape&gt; prototype) {
        prototypes[key] = move(prototype);
    }

    unique_ptr&lt;Shape&gt; createShape(const string&amp; key) {
        auto it = prototypes.find(key);
        if (it != prototypes.end()) {
            return it-&gt;second-&gt;clone();
        }
        return nullptr;
    }
};

<pre><code class="language-cpp">/*
 * ADAPTER PATTERN - Structural Pattern
 * 
 * PURPOSE:
 * Allows objects with incompatible interfaces to collaborate by converting
 * the interface of one class into another interface that clients expect.
 * 
 * WHEN TO USE:
 * - Want to use existing class but its interface doesn't match what you need
 * - Need to create reusable class that cooperates with unrelated classes
 * - Need to use several existing subclasses but can't adapt each one by subclassing
 * - Working with legacy code or third-party libraries
 * 
 * PROS:
 * + Single Responsibility: separates interface conversion from business logic
 * + Open/Closed Principle: can introduce new adapters without changing existing code
 * + Makes incompatible interfaces work together
 * + Increases reusability of existing code
 * 
 * CONS:
 * - Overall complexity increases (new classes)
 * - Sometimes simpler to just change the service class
 * 
 * REAL-WORLD EXAMPLES:
 * - Power adapters (different plug types)
 * - Database adapters (uniform interface for different databases)
 * - Third-party library integration
 * - Legacy system integration
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;memory&gt;
#include &lt;cmath&gt;

using namespace std;

// ============= Example 1: Media Player =============

// Target interface (what client expects)
class MediaPlayer {
public:
    virtual ~MediaPlayer() = default;
    virtual void play(const string&amp; audioType, const string&amp; fileName) = 0;
};

// Adaptee 1: Advanced Media Player (incompatible interface)
class AdvancedMP3Player {
public:
    void playMP3(const string&amp; fileName) {
        cout &lt;&lt; &quot;Playing MP3 file: &quot; &lt;&lt; fileName &lt;&lt; endl;
    }
};

class AdvancedMP4Player {
public:
    void playMP4(const string&amp; fileName) {
        cout &lt;&lt; &quot;Playing MP4 file: &quot; &lt;&lt; fileName &lt;&lt; endl;
    }
};

class AdvancedVLCPlayer {
public:
    void playVLC(const string&amp; fileName) {
        cout &lt;&lt; &quot;Playing VLC file: &quot; &lt;&lt; fileName &lt;&lt; endl;
    }
};

// Adapter: Makes advanced players compatible with MediaPlayer interface
class MediaAdapter : public MediaPlayer {
private:
    unique_ptr&lt;AdvancedMP3Player&gt; mp3Player;
    unique_ptr&lt;AdvancedMP4Player&gt; mp4Player;
    unique_ptr&lt;AdvancedVLCPlayer&gt; vlcPlayer;

public:
    MediaAdapter() {
        mp3Player = make_unique&lt;AdvancedMP3Player&gt;();
        mp4Player = make_unique&lt;AdvancedMP4Player&gt;();
        vlcPlayer = make_unique&lt;AdvancedVLCPlayer&gt;();
    }

    void play(const string&amp; audioType, const string&amp; fileName) override {
        if (audioType == &quot;mp3&quot;) {
            mp3Player-&gt;playMP3(fileName);
        } else if (audioType == &quot;mp4&quot;) {
            mp4Player-&gt;playMP4(fileName);
        } else if (audioType == &quot;vlc&quot;) {
            vlcPlayer-&gt;playVLC(fileName);
        } else {
            cout &lt;&lt; &quot;Invalid media type: &quot; &lt;&lt; audioType &lt;&lt; endl;
        }
    }
};

// Client: Audio Player
class AudioPlayer : public MediaPlayer {
private:
    unique_ptr&lt;MediaAdapter&gt; mediaAdapter;

public:
    AudioPlayer() {
        mediaAdapter = make_unique&lt;MediaAdapter&gt;();
    }

    void play(const string&amp; audioType, const string&amp; fileName) override {
        // Built-in support for MP3
        if (audioType == &quot;mp3&quot;) {
            cout &lt;&lt; &quot;Playing MP3 file (native): &quot; &lt;&lt; fileName &lt;&lt; endl;
        }
        // Use adapter for other formats
        else if (audioType == &quot;mp4&quot; || audioType == &quot;vlc&quot;) {
            mediaAdapter-&gt;play(audioType, fileName);
        }
        else {
            cout &lt;&lt; &quot;Invalid media type: &quot; &lt;&lt; audioType &lt;&lt; endl;
        }
    }
};

// Target interface
class Shape {
public:

    virtual void draw(int x, int y, int width, int height) = 0;
};

class RectangleAdapter : public Shape, private LegacyRectangle {

};

<pre><code class="language-cpp">/*
 * BRIDGE PATTERN - Structural Pattern
 * 
 * PURPOSE:
 * Separates an abstraction from its implementation so that the two can vary
 * independently. Uses composition over inheritance.
 * 
 * WHEN TO USE:
 * - Want to avoid permanent binding between abstraction and implementation
 * - Both abstractions and implementations should be extensible by subclassing
 * - Changes in implementation shouldn't affect clients
 * - Want to hide implementation from clients completely
 * - Have proliferation of classes (cartesian product problem)
 * 
 * PROS:
 * + Decouples interface from implementation
 * + Improved extensibility (extend abstraction and implementation independently)
 * + Hides implementation details from clients
 * + Single Responsibility Principle
 * + Open/Closed Principle
 * 
 * CONS:
 * - Increased complexity
 * - May be overkill for simple scenarios
 * 
 * REAL-WORLD EXAMPLES:
 * - GUI frameworks (separate abstraction from platform-specific implementation)
 * - Device drivers
 * - Database drivers (JDBC in Java)
 * - Graphics rendering (separate shape from rendering method)
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;memory&gt;

using namespace std;

// ============= Example 1: Remote Control and Devices =============

// Implementation interface
class Device {
public:
    virtual ~Device() = default;
    virtual void turnOn() = 0;
    virtual void turnOff() = 0;
    virtual void setVolume(int volume) = 0;
    virtual int getVolume() = 0;
    virtual void setChannel(int channel) = 0;
    virtual int getChannel() = 0;
};

// Concrete Implementation 1: TV
class TV : public Device {
private:
    bool on;
    int volume;
    int channel;

public:
    TV() : on(false), volume(30), channel(1) {}

    void turnOn() override {
        on = true;
        cout &lt;&lt; &quot;TV: Turning ON&quot; &lt;&lt; endl;
    }

    void turnOff() override {
        on = false;
        cout &lt;&lt; &quot;TV: Turning OFF&quot; &lt;&lt; endl;
    }

    void setVolume(int vol) override {
        volume = vol;
        cout &lt;&lt; &quot;TV: Setting volume to &quot; &lt;&lt; volume &lt;&lt; endl;
    }

    int getVolume() override {
        return volume;
    }

    void setChannel(int ch) override {
        channel = ch;
        cout &lt;&lt; &quot;TV: Setting channel to &quot; &lt;&lt; channel &lt;&lt; endl;
    }

    int getChannel() override {
        return channel;
    }
};

// Concrete Implementation 2: Radio
class Radio : public Device {
private:
    bool on;
    int volume;
    int channel;

public:
    Radio() : on(false), volume(20), channel(88) {}

    void turnOn() override {
        on = true;
        cout &lt;&lt; &quot;Radio: Turning ON&quot; &lt;&lt; endl;
    }

    void turnOff() override {
        on = false;
        cout &lt;&lt; &quot;Radio: Turning OFF&quot; &lt;&lt; endl;
    }

    void setVolume(int vol) override {
        volume = vol;
        cout &lt;&lt; &quot;Radio: Setting volume to &quot; &lt;&lt; volume &lt;&lt; endl;
    }

    int getVolume() override {
        return volume;
    }

    void setChannel(int ch) override {
        channel = ch;
        cout &lt;&lt; &quot;Radio: Setting frequency to &quot; &lt;&lt; channel &lt;&lt; &quot; FM&quot; &lt;&lt; endl;

// Abstraction: Remote Control
class RemoteControl {
protected:
    shared_ptr&lt;Device&gt; device;

public:
    RemoteControl(shared_ptr&lt;Device&gt; dev) : device(dev) {}
    virtual ~RemoteControl() = default;

    virtual void togglePower() {
        cout &lt;&lt; &quot;Remote: Toggling power&quot; &lt;&lt; endl;
        // Simple toggle logic
        device-&gt;turnOn();
    }

    virtual void volumeUp() {
        int vol = device-&gt;getVolume();
        device-&gt;setVolume(vol + 10);
    }

    virtual void volumeDown() {
        int vol = device-&gt;getVolume();
        device-&gt;setVolume(vol - 10);

    virtual void channelUp() {
        int ch = device-&gt;getChannel();
        device-&gt;setChannel(ch + 1);
    }

    virtual void channelDown() {
        int ch = device-&gt;getChannel();
        device-&gt;setChannel(ch - 1);
    }
};

<pre><code class="language-cpp">/*
 * COMPOSITE PATTERN - Structural Pattern
 * 
 * PURPOSE:
 * Composes objects into tree structures to represent part-whole hierarchies.
 * Lets clients treat individual objects and compositions uniformly.
 * 
 * WHEN TO USE:
 * - Need to represent part-whole hierarchies of objects
 * - Want clients to treat individual objects and compositions uniformly
 * - Need tree structures (file systems, GUI components, organizational charts)
 * 
 * PROS:
 * + Simplifies client code (treats all objects uniformly)
 * + Easy to add new component types
 * + Follows Open/Closed Principle
 * + Tree structure is natural and intuitive
 * 
 * CONS:
 * - Can make design overly general
 * - Difficult to restrict component types
 * - Type safety can be compromised
 * 
 * REAL-WORLD EXAMPLES:
 * - File systems (files and directories)
 * - GUI components (containers and widgets)
 * - Organizational charts (employees and departments)
 * - Graphics (shapes and groups)
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;vector&gt;
#include &lt;memory&gt;
#include &lt;algorithm&gt;

using namespace std;

// ============= Example 1: File System =============

// Component interface
class FileSystemComponent {
protected:
    string name;

public:
    FileSystemComponent(const string&amp; n) : name(n) {}
    virtual ~FileSystemComponent() = default;

    virtual void display(int depth = 0) const = 0;
    virtual int getSize() const = 0;
    virtual string getName() const { return name; }

    // Optional: add/remove methods (may not make sense for leaf)
    virtual void add(shared_ptr&lt;FileSystemComponent&gt; component) {
        throw runtime_error(&quot;Cannot add to a file&quot;);
    }

    virtual void remove(shared_ptr&lt;FileSystemComponent&gt; component) {
        throw runtime_error(&quot;Cannot remove from a file&quot;);
    }
};

// Leaf: File
class File : public FileSystemComponent {
private:
    int size;

public:
    File(const string&amp; name, int size) : FileSystemComponent(name), size(size) {}

    void display(int depth = 0) const override {
        cout &lt;&lt; string(depth, ' ') &lt;&lt; &quot;📄 &quot; &lt;&lt; name &lt;&lt; &quot; (&quot; &lt;&lt; size &lt;&lt; &quot; KB)&quot; &lt;&lt; endl;
    }

    int getSize() const override {
        return size;
    }
};

// Composite: Directory
class Directory : public FileSystemComponent {
private:
    vector&lt;shared_ptr&lt;FileSystemComponent&gt;&gt; children;

public:
    Directory(const string&amp; name) : FileSystemComponent(name) {}

    void add(shared_ptr&lt;FileSystemComponent&gt; component) override {
        children.push_back(component);
    }

    void remove(shared_ptr&lt;FileSystemComponent&gt; component) override {
        auto it = find(children.begin(), children.end(), component);
        if (it != children.end()) {
            children.erase(it);
        }
    }

    void display(int depth = 0) const override {
        cout &lt;&lt; string(depth, ' ') &lt;&lt; &quot;📁 &quot; &lt;&lt; name &lt;&lt; &quot;/&quot; &lt;&lt; endl;
        for (const auto&amp; child : children) {
            child-&gt;display(depth + 2);
        }
    }

    int getSize() const override {
        int totalSize = 0;
        for (const auto&amp; child : children) {
            totalSize += child-&gt;getSize();
        }
        return totalSize;
    }
};

// ============= Example 2: Graphics System =============

// Component
class Graphic {
public:
    virtual ~Graphic() = default;
    virtual void draw() const = 0;
    virtual void move(int x, int y) = 0;
};

// Leaf: Circle
class GraphicCircle : public Graphic {
private:
    int x, y, radius;

public:
    GraphicCircle(int x, int y, int r) : x(x), y(y), radius(r) {}

    void draw() const override {
        cout &lt;&lt; &quot;  Circle at (&quot; &lt;&lt; x &lt;&lt; &quot;,&quot; &lt;&lt; y &lt;&lt; &quot;) with radius &quot; &lt;&lt; radius &lt;&lt; endl;
    }

    void move(int dx, int dy) override {
        x += dx;
        y += dy;
    }
};

// Leaf: Rectangle
class GraphicRectangle : public Graphic {
private:
    int x, y, width, height;

public:
    GraphicRectangle(int x, int y, int w, int h) : x(x), y(y), width(w), height(h) {}

    void draw() const override {
        cout &lt;&lt; &quot;  Rectangle at (&quot; &lt;&lt; x &lt;&lt; &quot;,&quot; &lt;&lt; y &lt;&lt; &quot;) with size &quot; 
             &lt;&lt; width &lt;&lt; &quot;x&quot; &lt;&lt; height &lt;&lt; endl;
    }

    void move(int dx, int dy) override {
        x += dx;
        y += dy;
    }
};

// Composite: Group
class GraphicGroup : public Graphic {
private:
    vector&lt;shared_ptr&lt;Graphic&gt;&gt; graphics;
    string groupName;

public:
    GraphicGroup(const string&amp; name) : groupName(name) {}

    void add(shared_ptr&lt;Graphic&gt; graphic) {
        graphics.push_back(graphic);
    }

    void remove(shared_ptr&lt;Graphic&gt; graphic) {
        auto it = find(graphics.begin(), graphics.end(), graphic);
        if (it != graphics.end()) {
            graphics.erase(it);
        }
    }

    void draw() const override {
        cout &lt;&lt; &quot;Group: &quot; &lt;&lt; groupName &lt;&lt; endl;
        for (const auto&amp; graphic : graphics) {
            graphic-&gt;draw();
        }
    }

    void move(int dx, int dy) override {
        for (auto&amp; graphic : graphics) {
            graphic-&gt;move(dx, dy);
        }
    }
};

// ============= Example 3: Company Organization =============

// Component
class Employee {
protected:
    string name;
    string position;
    int salary;

public:
    Employee(const string&amp; n, const string&amp; pos, int sal) 
        : name(n), position(pos), salary(sal) {}
    virtual ~Employee() = default;

    virtual void showDetails(int depth = 0) const = 0;
    virtual int getTotalSalary() const = 0;

    virtual void addSubordinate(shared_ptr&lt;Employee&gt; emp) {
        throw runtime_error(&quot;Cannot add subordinate to individual contributor&quot;);
    }

    virtual void removeSubordinate(shared_ptr&lt;Employee&gt; emp) {
        throw runtime_error(&quot;Cannot remove subordinate from individual contributor&quot;);
    }
};

// Leaf: Individual Contributor
class IndividualContributor : public Employee {
public:
    IndividualContributor(const string&amp; n, const string&amp; pos, int sal)
        : Employee(n, pos, sal) {}

    void showDetails(int depth = 0) const override {
        cout &lt;&lt; string(depth, ' ') &lt;&lt; &quot;👤 &quot; &lt;&lt; name &lt;&lt; &quot; - &quot; &lt;&lt; position 
             &lt;&lt; &quot; (Salary: $&quot; &lt;&lt; salary &lt;&lt; &quot;)&quot; &lt;&lt; endl;
    }

    int getTotalSalary() const override {
        return salary;
    }
};

// Composite: Manager
class Manager : public Employee {
private:
    vector&lt;shared_ptr&lt;Employee&gt;&gt; subordinates;

public:
    Manager(const string&amp; n, const string&amp; pos, int sal)
        : Employee(n, pos, sal) {}

    void addSubordinate(shared_ptr&lt;Employee&gt; emp) override {
        subordinates.push_back(emp);
    }

    void removeSubordinate(shared_ptr&lt;Employee&gt; emp) override {
        auto it = find(subordinates.begin(), subordinates.end(), emp);
        if (it != subordinates.end()) {
            subordinates.erase(it);
        }
    }

    void showDetails(int depth = 0) const override {
        cout &lt;&lt; string(depth, ' ') &lt;&lt; &quot;👔 &quot; &lt;&lt; name &lt;&lt; &quot; - &quot; &lt;&lt; position 
             &lt;&lt; &quot; (Salary: $&quot; &lt;&lt; salary &lt;&lt; &quot;)&quot; &lt;&lt; endl;
        for (const auto&amp; sub : subordinates) {
            sub-&gt;showDetails(depth + 2);
        }
    }

    int getTotalSalary() const override {
        int total = salary;
        for (const auto&amp; sub : subordinates) {
            total += sub-&gt;getTotalSalary();
        }
        return total;
    }
};

 * 
 * PURPOSE:
 * Attaches additional responsibilities to an object dynamically.
 * Provides a flexible alternative to subclassing for extending functionality.
 * 
 * WHEN TO USE:
 * - Want to add responsibilities to objects dynamically and transparently
 * - Need to add responsibilities that can be withdrawn
 * - Extension by subclassing is impractical (too many combinations)
 * - Want to avoid class explosion
 * 
 * PROS:
 * + More flexible than static inheritance
 * + Avoids feature-laden classes high up in hierarchy
 * + Can add/remove responsibilities at runtime
 * + Can combine multiple decorators
 * + Single Responsibility Principle: each decorator has one job
 * + Open/Closed Principle: extend behavior without modifying existing code
 * 
 * CONS:
 * - Lots of small classes can be hard to understand
 * - Order of decorators matters
 * - Hard to remove a specific decorator from the stack
 * 
 * REAL-WORLD EXAMPLES:
 * - GUI components (scrollbars, borders)
 * - I/O streams (BufferedReader, GZIPInputStream in Java)
 * - Coffee shop (coffee + milk + sugar + whipped cream)
 * - Text formatting (bold, italic, underline)
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;memory&gt;

using namespace std;

// ============= Example 1: Coffee Shop =============

// Component interface
class Coffee {
public:
    virtual ~Coffee() = default;
    virtual string getDescription() const = 0;
    virtual double getCost() const = 0;
};

// Concrete Component
class SimpleCoffee : public Coffee {
public:
    string getDescription() const override {
        return &quot;Simple Coffee&quot;;
    }

    double getCost() const override {
        return 2.0;
    }
};

class Espresso : public Coffee {
public:
    string getDescription() const override {
        return &quot;Espresso&quot;;
    }

    double getCost() const override {
        return 3.0;
    }
};

// Base Decorator
class CoffeeDecorator : public Coffee {
protected:
    unique_ptr&lt;Coffee&gt; coffee;

public:
    CoffeeDecorator(unique_ptr&lt;Coffee&gt; c) : coffee(move(c)) {}
};

// Concrete Decorators
class Milk : public CoffeeDecorator {
public:
    Milk(unique_ptr&lt;Coffee&gt; c) : CoffeeDecorator(move(c)) {}

    string getDescription() const override {
        return coffee-&gt;getDescription() + &quot; + Milk&quot;;
    }

    double getCost() const override {
        return coffee-&gt;getCost() + 0.5;
    }
};

class Sugar : public CoffeeDecorator {
public:
    Sugar(unique_ptr&lt;Coffee&gt; c) : CoffeeDecorator(move(c)) {}

    string getDescription() const override {
        return coffee-&gt;getDescription() + &quot; + Sugar&quot;;
    }

    double getCost() const override {
        return coffee-&gt;getCost() + 0.2;
    }
};

class WhippedCream : public CoffeeDecorator {
public:
    WhippedCream(unique_ptr&lt;Coffee&gt; c) : CoffeeDecorator(move(c)) {}

    string getDescription() const override {
        return coffee-&gt;getDescription() + &quot; + Whipped Cream&quot;;
    }

    double getCost() const override {
        return coffee-&gt;getCost() + 0.7;
    }
};

class Caramel : public CoffeeDecorator {
public:
    Caramel(unique_ptr&lt;Coffee&gt; c) : CoffeeDecorator(move(c)) {}

    string getDescription() const override {
        return coffee-&gt;getDescription() + &quot; + Caramel&quot;;
    }

    double getCost() const override {
        return coffee-&gt;getCost() + 0.6;
    }
};

// ============= Example 2: Text Formatting =============

// Component
class Text {
public:
    virtual ~Text() = default;
    virtual string render() const = 0;
};

// Concrete Component
class PlainText : public Text {
private:
    string content;

public:
    PlainText(const string&amp; text) : content(text) {}

    string render() const override {
        return content;
    }
};

// Base Decorator
class TextDecorator : public Text {
protected:
    unique_ptr&lt;Text&gt; text;

public:
    TextDecorator(unique_ptr&lt;Text&gt; t) : text(move(t)) {}
};

// Concrete Decorators
class BoldDecorator : public TextDecorator {
public:
    BoldDecorator(unique_ptr&lt;Text&gt; t) : TextDecorator(move(t)) {}

    string render() const override {
        return &quot;&lt;b&gt;&quot; + text-&gt;render() + &quot;&lt;/b&gt;&quot;;
    }
};

class ItalicDecorator : public TextDecorator {
public:
    ItalicDecorator(unique_ptr&lt;Text&gt; t) : TextDecorator(move(t)) {}

    string render() const override {
        return &quot;&lt;i&gt;&quot; + text-&gt;render() + &quot;&lt;/i&gt;&quot;;
    }
};

class UnderlineDecorator : public TextDecorator {
public:
    UnderlineDecorator(unique_ptr&lt;Text&gt; t) : TextDecorator(move(t)) {}

    string render() const override {
        return &quot;&lt;u&gt;&quot; + text-&gt;render() + &quot;&lt;/u&gt;&quot;;
    }
};

// ============= Example 3: Data Source (I/O) =============

// Component
class DataSource {
public:
    virtual ~DataSource() = default;
    virtual void writeData(const string&amp; data) = 0;
    virtual string readData() = 0;
};

// Concrete Component
class FileDataSource : public DataSource {
private:
    string filename;
    string content;

public:
    FileDataSource(const string&amp; name) : filename(name) {}

    void writeData(const string&amp; data) override {
        content = data;
        cout &lt;&lt; &quot;Writing to file '&quot; &lt;&lt; filename &lt;&lt; &quot;': &quot; &lt;&lt; data &lt;&lt; endl;
    }

    string readData() override {
        cout &lt;&lt; &quot;Reading from file '&quot; &lt;&lt; filename &lt;&lt; &quot;'&quot; &lt;&lt; endl;
        return content;
    }
};

// Base Decorator
class DataSourceDecorator : public DataSource {
protected:
    unique_ptr&lt;DataSource&gt; wrappee;

public:
    DataSourceDecorator(unique_ptr&lt;DataSource&gt; source) : wrappee(move(source)) {}
};

// Concrete Decorators
class EncryptionDecorator : public DataSourceDecorator {
public:
    EncryptionDecorator(unique_ptr&lt;DataSource&gt; source) 
        : DataSourceDecorator(move(source)) {}

    void writeData(const string&amp; data) override {
        string encrypted = encrypt(data);
        cout &lt;&lt; &quot;Encrypting data...&quot; &lt;&lt; endl;
        wrappee-&gt;writeData(encrypted);
    }

    string readData() override {
        string data = wrappee-&gt;readData();
        cout &lt;&lt; &quot;Decrypting data...&quot; &lt;&lt; endl;
        return decrypt(data);
    }

private:
    string encrypt(const string&amp; data) {
        // Simple Caesar cipher for demonstration
        string result = data;
        for (char&amp; c : result) {
            if (isalpha(c)) {
                c = ((c - 'a' + 3) % 26) + 'a';
            }
        }
        return result;
    }

    string decrypt(const string&amp; data) {
        string result = data;
        for (char&amp; c : result) {
            if (isalpha(c)) {
                c = ((c - 'a' - 3 + 26) % 26) + 'a';
            }
        }
        return result;
    }
};

class CompressionDecorator : public DataSourceDecorator {
public:
    CompressionDecorator(unique_ptr&lt;DataSource&gt; source) 
        : DataSourceDecorator(move(source)) {}

    void writeData(const string&amp; data) override {
        string compressed = compress(data);
        cout &lt;&lt; &quot;Compressing data (from &quot; &lt;&lt; data.length() 
             &lt;&lt; &quot; to &quot; &lt;&lt; compressed.length() &lt;&lt; &quot; chars)...&quot; &lt;&lt; endl;
        wrappee-&gt;writeData(compressed);
    }

    string readData() override {
        string data = wrappee-&gt;readData();
        cout &lt;&lt; &quot;Decompressing data...&quot; &lt;&lt; endl;
        return decompress(data);
    }

private:
    string compress(const string&amp; data) {
        // Simple mock compression (remove spaces)
        string result;
        for (char c : data) {
            if (c != ' ') result += c;
        }
        return result;
    }

    string decompress(const string&amp; data) {
        // Mock decompression (add spaces back)
        return data;
    }
};

<pre><code class="language-cpp">/*
 * FACADE PATTERN - Structural Pattern
 * 
 * PURPOSE:
 * Provides a simplified interface to a complex subsystem.
 * Makes the subsystem easier to use by wrapping complex operations.
 * 
 * WHEN TO USE:
 * - Want to provide simple interface to complex subsystem
 * - Need to decouple subsystem from clients and other subsystems
 * - Want to layer your subsystems
 * - Many dependencies between clients and implementation classes
 * 
 * PROS:
 * + Simplifies interface to complex system
 * + Isolates clients from subsystem components
 * + Promotes weak coupling
 * + Easier to use, understand, and test
 * + Can provide multiple facades for different needs
 * 
 * CONS:
 * - Facade can become god object coupled to all classes
 * - May provide limited functionality
 * - Additional layer of abstraction
 * 
 * REAL-WORLD EXAMPLES:
 * - Computer startup (coordinates CPU, memory, HDD, etc.)
 * - Library APIs (simplify complex operations)
 * - Online shopping checkout
 * - Hotel booking system
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;memory&gt;

using namespace std;

// ============= Example 1: Home Theater System =============

// Complex subsystem classes
class DVDPlayer {
public:
    void on() { cout &lt;&lt; &quot;DVD Player: Turning ON&quot; &lt;&lt; endl; }
    void off() { cout &lt;&lt; &quot;DVD Player: Turning OFF&quot; &lt;&lt; endl; }
    void play(const string&amp; movie) { 
        cout &lt;&lt; &quot;DVD Player: Playing '&quot; &lt;&lt; movie &lt;&lt; &quot;'&quot; &lt;&lt; endl; 
    }
    void stop() { cout &lt;&lt; &quot;DVD Player: Stopping playback&quot; &lt;&lt; endl; }
    void eject() { cout &lt;&lt; &quot;DVD Player: Ejecting disc&quot; &lt;&lt; endl; }
};

class Amplifier {
public:
    void on() { cout &lt;&lt; &quot;Amplifier: Turning ON&quot; &lt;&lt; endl; }
    void off() { cout &lt;&lt; &quot;Amplifier: Turning OFF&quot; &lt;&lt; endl; }
    void setVolume(int level) { 
        cout &lt;&lt; &quot;Amplifier: Setting volume to &quot; &lt;&lt; level &lt;&lt; endl; 
    }
    void setSurroundSound() { cout &lt;&lt; &quot;Amplifier: Enabling surround sound&quot; &lt;&lt; endl; }
};

class Projector {
public:
    void on() { cout &lt;&lt; &quot;Projector: Turning ON&quot; &lt;&lt; endl; }
    void off() { cout &lt;&lt; &quot;Projector: Turning OFF&quot; &lt;&lt; endl; }
    void wideScreenMode() { cout &lt;&lt; &quot;Projector: Setting wide screen mode&quot; &lt;&lt; endl; }
};

class Lights {
public:
    void dim(int level) { 
        cout &lt;&lt; &quot;Lights: Dimming to &quot; &lt;&lt; level &lt;&lt; &quot;%&quot; &lt;&lt; endl; 
    }
    void on() { cout &lt;&lt; &quot;Lights: Turning ON (100%)&quot; &lt;&lt; endl; }
};

class Screen {
public:
    void down() { cout &lt;&lt; &quot;Screen: Moving down&quot; &lt;&lt; endl; }
    void up() { cout &lt;&lt; &quot;Screen: Moving up&quot; &lt;&lt; endl; }
};

class PopcornMaker {
public:
    void on() { cout &lt;&lt; &quot;Popcorn Maker: Turning ON&quot; &lt;&lt; endl; }
    void off() { cout &lt;&lt; &quot;Popcorn Maker: Turning OFF&quot; &lt;&lt; endl; }
    void pop() { cout &lt;&lt; &quot;Popcorn Maker: Popping popcorn!&quot; &lt;&lt; endl; }
};

// Facade: Simplifies the complex subsystem
class HomeTheaterFacade {
private:
    unique_ptr&lt;DVDPlayer&gt; dvd;
    unique_ptr&lt;Amplifier&gt; amp;
    unique_ptr&lt;Projector&gt; projector;
    unique_ptr&lt;Lights&gt; lights;
    unique_ptr&lt;Screen&gt; screen;
    unique_ptr&lt;PopcornMaker&gt; popcorn;

public:
    HomeTheaterFacade() {
        dvd = make_unique&lt;DVDPlayer&gt;();
        amp = make_unique&lt;Amplifier&gt;();
        projector = make_unique&lt;Projector&gt;();
        lights = make_unique&lt;Lights&gt;();
        screen = make_unique&lt;Screen&gt;();
        popcorn = make_unique&lt;PopcornMaker&gt;();
    }

    void watchMovie(const string&amp; movie) {
        cout &lt;&lt; &quot;\\n=== Getting ready to watch '&quot; &lt;&lt; movie &lt;&lt; &quot;' ===&quot; &lt;&lt; endl;
        popcorn-&gt;on();
        popcorn-&gt;pop();
        lights-&gt;dim(10);
        screen-&gt;down();
        projector-&gt;on();
        projector-&gt;wideScreenMode();
        amp-&gt;on();
        amp-&gt;setSurroundSound();
        amp-&gt;setVolume(5);
        dvd-&gt;on();
        dvd-&gt;play(movie);
        cout &lt;&lt; &quot;=== Enjoy your movie! ===&quot; &lt;&lt; endl;
    }

    void endMovie() {
        cout &lt;&lt; &quot;\\n=== Shutting down home theater ===&quot; &lt;&lt; endl;
        popcorn-&gt;off();
        lights-&gt;on();
        screen-&gt;up();
        projector-&gt;off();
        amp-&gt;off();
        dvd-&gt;stop();
        dvd-&gt;eject();
        dvd-&gt;off();
        cout &lt;&lt; &quot;=== Movie time is over ===&quot; &lt;&lt; endl;
    }
};

// ============= Example 2: Computer System =============

// Subsystem classes
class CPU {
public:
    void freeze() { cout &lt;&lt; &quot;CPU: Freezing...&quot; &lt;&lt; endl; }
    void jump(long position) { 
        cout &lt;&lt; &quot;CPU: Jumping to position &quot; &lt;&lt; position &lt;&lt; endl; 
    }
    void execute() { cout &lt;&lt; &quot;CPU: Executing...&quot; &lt;&lt; endl; }
};

class Memory {
public:
    void load(long position, const string&amp; data) {
        cout &lt;&lt; &quot;Memory: Loading data at position &quot; &lt;&lt; position &lt;&lt; endl;
    }
};

class HardDrive {
public:
    string read(long lba, int size) {
        cout &lt;&lt; &quot;HardDrive: Reading &quot; &lt;&lt; size &lt;&lt; &quot; bytes from sector &quot; &lt;&lt; lba &lt;&lt; endl;
        return &quot;boot_data&quot;;
    }
};

// Facade
class ComputerFacade {
private:
    unique_ptr&lt;CPU&gt; cpu;
    unique_ptr&lt;Memory&gt; memory;
    unique_ptr&lt;HardDrive&gt; hardDrive;

public:
    ComputerFacade() {
        cpu = make_unique&lt;CPU&gt;();
        memory = make_unique&lt;Memory&gt;();
        hardDrive = make_unique&lt;HardDrive&gt;();
    }

    void start() {
        cout &lt;&lt; &quot;\\n=== Starting Computer ===&quot; &lt;&lt; endl;
        cpu-&gt;freeze();
        string bootData = hardDrive-&gt;read(0, 1024);
        memory-&gt;load(0, bootData);
        cpu-&gt;jump(0);
        cpu-&gt;execute();
        cout &lt;&lt; &quot;=== Computer started successfully ===&quot; &lt;&lt; endl;
    }
};

// ============= Example 3: Online Shopping =============

// Subsystem classes
class Inventory {
public:
    bool checkAvailability(const string&amp; product) {
        cout &lt;&lt; &quot;Inventory: Checking availability of &quot; &lt;&lt; product &lt;&lt; endl;
        return true;
    }

    void reserve(const string&amp; product) {
        cout &lt;&lt; &quot;Inventory: Reserving &quot; &lt;&lt; product &lt;&lt; endl;
    }
};

class PaymentProcessor {
public:
    bool processPayment(double amount) {
        cout &lt;&lt; &quot;Payment: Processing payment of $&quot; &lt;&lt; amount &lt;&lt; endl;
        return true;
    }
};

class ShippingService {
public:
    void shipProduct(const string&amp; product, const string&amp; address) {
        cout &lt;&lt; &quot;Shipping: Shipping &quot; &lt;&lt; product &lt;&lt; &quot; to &quot; &lt;&lt; address &lt;&lt; endl;
    }
};

class NotificationService {
public:
    void sendConfirmation(const string&amp; email) {
        cout &lt;&lt; &quot;Notification: Sending confirmation email to &quot; &lt;&lt; email &lt;&lt; endl;
    }
};

// Facade
class OnlineShoppingFacade {
private:
    unique_ptr&lt;Inventory&gt; inventory;
    unique_ptr&lt;PaymentProcessor&gt; payment;
    unique_ptr&lt;ShippingService&gt; shipping;
    unique_ptr&lt;NotificationService&gt; notification;

public:
    OnlineShoppingFacade() {
        inventory = make_unique&lt;Inventory&gt;();
        payment = make_unique&lt;PaymentProcessor&gt;();
        shipping = make_unique&lt;ShippingService&gt;();
        notification = make_unique&lt;NotificationService&gt;();
    }

    bool placeOrder(const string&amp; product, double price, 
                    const string&amp; address, const string&amp; email) {
        cout &lt;&lt; &quot;\\n=== Processing Order ===&quot; &lt;&lt; endl;

        // Check availability
        if (!inventory-&gt;checkAvailability(product)) {
            cout &lt;&lt; &quot;Order failed: Product not available&quot; &lt;&lt; endl;
            return false;
        }

        // Process payment
        if (!payment-&gt;processPayment(price)) {
            cout &lt;&lt; &quot;Order failed: Payment declined&quot; &lt;&lt; endl;
            return false;
        }

        // Reserve and ship
        inventory-&gt;reserve(product);
        shipping-&gt;shipProduct(product, address);
        notification-&gt;sendConfirmation(email);

        cout &lt;&lt; &quot;=== Order completed successfully! ===&quot; &lt;&lt; endl;
        return true;
    }
};

// Facade

<pre><code class="language-cpp">/*
 * FLYWEIGHT PATTERN - Structural Pattern
 * 
 * PURPOSE:
 * Minimizes memory usage by sharing common data among multiple objects.
 * Uses sharing to support large numbers of fine-grained objects efficiently.
 * 
 * WHEN TO USE:
 * - Application uses large number of objects
 * - Storage costs are high because of sheer quantity
 * - Most object state can be made extrinsic (shared)
 * - Many groups of objects can be replaced by few shared objects
 * - Application doesn't depend on object identity
 * 
 * PROS:
 * + Saves memory when dealing with many similar objects
 * + Improves performance by reducing object creation
 * + Centralized state management
 * 
 * CONS:
 * - Complexity increases
 * - Must carefully distinguish intrinsic vs extrinsic state
 * - May introduce runtime costs for computing extrinsic state
 * 
 * REAL-WORLD EXAMPLES:
 * - Text editors (character objects sharing font/style)
 * - Game development (trees, particles in a forest)
 * - String interning (Java, Python)
 * - Database connection pooling
 */

// Flyweight: Intrinsic state (shared)
class TreeType {
private:
    string name;
    string color;
    string texture;

public:
    TreeType(const string&amp; n, const string&amp; c, const string&amp; t)
        : name(n), color(c), texture(t) {
        cout &lt;&lt; &quot;Creating TreeType: &quot; &lt;&lt; name &lt;&lt; &quot; (memory allocated)&quot; &lt;&lt; endl;
    }

    void draw(int x, int y) const {
        cout &lt;&lt; &quot;Drawing &quot; &lt;&lt; name &lt;&lt; &quot; tree (&quot; &lt;&lt; color &lt;&lt; &quot;, &quot; &lt;&lt; texture 
             &lt;&lt; &quot;) at (&quot; &lt;&lt; x &lt;&lt; &quot;, &quot; &lt;&lt; y &lt;&lt; &quot;)&quot; &lt;&lt; endl;
    }

    string getName() const { return name; }
};

// Flyweight Factory
class TreeFactory {
private:
    static unordered_map&lt;string, shared_ptr&lt;TreeType&gt;&gt; treeTypes;

public:
    static shared_ptr&lt;TreeType&gt; getTreeType(const string&amp; name, 
                                           const string&amp; color, 
                                           const string&amp; texture) {
        string key = name + &quot;_&quot; + color + &quot;_&quot; + texture;

        if (treeTypes.find(key) == treeTypes.end()) {
            treeTypes[key] = make_shared&lt;TreeType&gt;(name, color, texture);
        } else {
            cout &lt;&lt; &quot;Reusing existing TreeType: &quot; &lt;&lt; name &lt;&lt; endl;
        }

        return treeTypes[key];
    }

    static int getTreeTypeCount() {
        return treeTypes.size();
    }
};

// Initialize static member

// Context: Extrinsic state (unique per object)
class Tree {

    shared_ptr&lt;TreeType&gt; type;  // Flyweight (intrinsic - shared)

public:
    Tree(int x, int y, shared_ptr&lt;TreeType&gt; type) 
        : x(x), y(y), type(type) {}

    void draw() const {
        type-&gt;draw(x, y);
    }
};

class Forest {

public:

// Flyweight Factory
class StyleFactory {

    static shared_ptr&lt;CharacterStyle&gt; getStyle(const string&amp; font, int size,

unordered_map&lt;string, shared_ptr&lt;CharacterStyle&gt;&gt; StyleFactory::styles;

<pre><code class="language-cpp">/*
 * PROXY PATTERN - Structural Pattern
 * 
 * PURPOSE:
 * Provides a surrogate or placeholder for another object to control access to it.
 * Creates a representative object that controls access to another object.
 * 
 * TYPES OF PROXIES:
 * - Virtual Proxy: Lazy initialization, creates expensive object on demand
 * - Protection Proxy: Controls access based on permissions
 * - Remote Proxy: Represents object in different address space
 * - Caching Proxy: Caches results of expensive operations
 * - Smart Reference: Additional actions when object is accessed
 * 
 * WHEN TO USE:
 * - Need lazy initialization (virtual proxy)
 * - Need access control (protection proxy)
 * - Need local representative of remote object (remote proxy)
 * - Want to add functionality without changing original object
 * 
 * PROS:
 * + Controls access to original object
 * + Can perform operations before/after accessing real object
 * + Works even if real object isn't ready
 * + Open/Closed Principle: new proxies without changing service
 * 
 * CONS:
 * - Response time may increase
 * - Additional layer of abstraction
 * - Code complexity increases
 * 
 * REAL-WORLD EXAMPLES:
 * - Credit card (proxy for bank account)
 * - Smart pointers
 * - Lazy loading images
 * - Network proxies
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;memory&gt;
#include &lt;unordered_map&gt;

using namespace std;

// ============= Example 1: Virtual Proxy (Lazy Loading) =============

// Subject interface
class Image {
public:
    virtual ~Image() = default;
    virtual void display() = 0;
    virtual string getFilename() const = 0;
};

// Real Subject: Heavy object
class RealImage : public Image {
private:
    string filename;

    void loadFromDisk() {
        cout &lt;&lt; &quot;Loading image from disk: &quot; &lt;&lt; filename &lt;&lt; &quot; (expensive operation)&quot; &lt;&lt; endl;
        // Simulate expensive loading operation
    }

public:
    RealImage(const string&amp; file) : filename(file) {
        loadFromDisk();
    }

    void display() override {
        cout &lt;&lt; &quot;Displaying image: &quot; &lt;&lt; filename &lt;&lt; endl;
    }

    string getFilename() const override {
        return filename;
    }
};

// Proxy: Provides lazy initialization
class ImageProxy : public Image {
private:
    string filename;
    unique_ptr&lt;RealImage&gt; realImage;

public:
    ImageProxy(const string&amp; file) : filename(file), realImage(nullptr) {
        cout &lt;&lt; &quot;ImageProxy created for: &quot; &lt;&lt; filename &lt;&lt; &quot; (no loading yet)&quot; &lt;&lt; endl;
    }

    void display() override {
        // Lazy initialization: create real object only when needed
        if (!realImage) {
            cout &lt;&lt; &quot;First access - loading real image...&quot; &lt;&lt; endl;
            realImage = make_unique&lt;RealImage&gt;(filename);
        }
        realImage-&gt;display();
    }

    string getFilename() const override {
        return filename;
    }
};

// ============= Example 2: Protection Proxy (Access Control) =============

// Subject
class Document {
public:
    virtual ~Document() = default;
    virtual void displayContent() = 0;
    virtual void editContent(const string&amp; newContent) = 0;
};

// Real Subject
class SecureDocument : public Document {
private:
    string content;

public:
    SecureDocument(const string&amp; initial) : content(initial) {
        cout &lt;&lt; &quot;SecureDocument created&quot; &lt;&lt; endl;
    }

    void displayContent() override {
        cout &lt;&lt; &quot;Document content: &quot; &lt;&lt; content &lt;&lt; endl;
    }

    void editContent(const string&amp; newContent) override {
        content = newContent;
        cout &lt;&lt; &quot;Document edited successfully&quot; &lt;&lt; endl;
    }
};

// Protection Proxy
class DocumentProxy : public Document {
private:
    unique_ptr&lt;SecureDocument&gt; realDocument;
    string userRole;  // &quot;admin&quot;, &quot;editor&quot;, &quot;viewer&quot;

public:
    DocumentProxy(const string&amp; content, const string&amp; role) 
        : realDocument(make_unique&lt;SecureDocument&gt;(content)), userRole(role) {
        cout &lt;&lt; &quot;DocumentProxy created for user role: &quot; &lt;&lt; role &lt;&lt; endl;
    }

    void displayContent() override {
        cout &lt;&lt; &quot;Checking read permissions...&quot; &lt;&lt; endl;
        // All roles can read
        realDocument-&gt;displayContent();
    }

    void editContent(const string&amp; newContent) override {
        cout &lt;&lt; &quot;Checking write permissions...&quot; &lt;&lt; endl;
        if (userRole == &quot;admin&quot; || userRole == &quot;editor&quot;) {
            realDocument-&gt;editContent(newContent);
        } else {
            cout &lt;&lt; &quot;Access denied: &quot; &lt;&lt; userRole &lt;&lt; &quot; cannot edit documents&quot; &lt;&lt; endl;
        }
    }
};

// ============= Example 3: Caching Proxy =============

// Subject
class DatabaseQuery {
public:
    virtual ~DatabaseQuery() = default;
    virtual string executeQuery(const string&amp; query) = 0;
};

// Real Subject
class RealDatabase : public DatabaseQuery {
public:
    string executeQuery(const string&amp; query) override {
        cout &lt;&lt; &quot;Executing query on database (slow operation): &quot; &lt;&lt; query &lt;&lt; endl;
        // Simulate slow database query
        return &quot;Result for: &quot; + query;
    }
};

// Caching Proxy
class CachingDatabaseProxy : public DatabaseQuery {
private:
    unique_ptr&lt;RealDatabase&gt; realDatabase;
    unordered_map&lt;string, string&gt; cache;

public:
    CachingDatabaseProxy() : realDatabase(make_unique&lt;RealDatabase&gt;()) {}

    string executeQuery(const string&amp; query) override {
        // Check cache first
        if (cache.find(query) != cache.end()) {
            cout &lt;&lt; &quot;Returning cached result for: &quot; &lt;&lt; query &lt;&lt; endl;
            return cache[query];
        }

        // Cache miss - execute real query
        cout &lt;&lt; &quot;Cache miss - executing real query&quot; &lt;&lt; endl;
        string result = realDatabase-&gt;executeQuery(query);
        cache[query] = result;
        return result;
    }

    void clearCache() {
        cache.clear();
        cout &lt;&lt; &quot;Cache cleared&quot; &lt;&lt; endl;
    }
};

// ============= Example 4: Smart Reference Proxy =============

// Subject
class NetworkResource {
public:
    virtual ~NetworkResource() = default;
    virtual void access() = 0;
};

// Real Subject
class RealNetworkResource : public NetworkResource {
private:
    string url;

public:
    RealNetworkResource(const string&amp; url) : url(url) {
        cout &lt;&lt; &quot;Connected to: &quot; &lt;&lt; url &lt;&lt; endl;
    }

    void access() override {
        cout &lt;&lt; &quot;Accessing resource at: &quot; &lt;&lt; url &lt;&lt; endl;
    }
};

// Smart Reference Proxy (tracks usage, manages lifecycle)
class NetworkResourceProxy : public NetworkResource {
private:
    unique_ptr&lt;RealNetworkResource&gt; resource;
    string url;
    int accessCount;

public:
    NetworkResourceProxy(const string&amp; url) 
        : url(url), accessCount(0), resource(nullptr) {}

    void access() override {
        // Create resource on first access
        if (!resource) {
            cout &lt;&lt; &quot;Establishing connection...&quot; &lt;&lt; endl;
            resource = make_unique&lt;RealNetworkResource&gt;(url);
        }

        // Log access
        accessCount++;
        cout &lt;&lt; &quot;[Proxy] Access #&quot; &lt;&lt; accessCount &lt;&lt; endl;

        // Perform actual access
        resource-&gt;access();

        // Additional functionality
        if (accessCount &gt;= 5) {
            cout &lt;&lt; &quot;[Proxy] Warning: High access count detected!&quot; &lt;&lt; endl;
        }
    }

    int getAccessCount() const {
        return accessCount;
    }

    ~NetworkResourceProxy() {
        cout &lt;&lt; &quot;[Proxy] Total accesses: &quot; &lt;&lt; accessCount &lt;&lt; endl;
        cout &lt;&lt; &quot;[Proxy] Cleaning up connection&quot; &lt;&lt; endl;
    }
};

// ============= Example 5: Remote Proxy (Simulated) =============

// Subject
class RemoteService {
public:
    virtual ~RemoteService() = default;
    virtual string processRequest(const string&amp; request) = 0;
};

// Real Subject (on remote server)
class RealRemoteService : public RemoteService {
public:
    string processRequest(const string&amp; request) override {
        return &quot;Server response for: &quot; + request;
    }
};

// Remote Proxy (client side)
class RemoteServiceProxy : public RemoteService {
private:
    unique_ptr&lt;RealRemoteService&gt; remoteService;
    string serverAddress;

public:
    RemoteServiceProxy(const string&amp; address) 
        : serverAddress(address), remoteService(make_unique&lt;RealRemoteService&gt;()) {}

    string processRequest(const string&amp; request) override {
        cout &lt;&lt; &quot;Connecting to server: &quot; &lt;&lt; serverAddress &lt;&lt; endl;
        cout &lt;&lt; &quot;Sending request over network...&quot; &lt;&lt; endl;

        // Simulate network communication
        string response = remoteService-&gt;processRequest(request);

        cout &lt;&lt; &quot;Receiving response...&quot; &lt;&lt; endl;
        return response;
    }
};

// Prettify function in JS (matching Python's prettify)
function prettify(component) {
    let c = component.replace(/^[0-9]+[_-]/, '');
    c = c.replace(/_/g, ' ').replace(/-/g, ' ').trim();
    if (c.toLowerCase() === 'readme') return 'README';
    if (c.toLowerCase() === 'cheatsheet') return 'Cheatsheet';
    return c.replace(/\b\w/g, l => l.toUpperCase());
}

/* ───── Cross-document link resolution (supports nested folders) ─────
   Docs may live in sub-directories and link to each other with relative
   paths ("../03_patterns/README.md"), bare files ("CHEATSHEET.md") or even a
   folder ("01_pthreads/"), which we resolve to that folder's README. */
const BY_PATH = {};        // "01_pthreads/readme.md"  -> idx
const BY_DIR_README = {};  // "01_pthreads" / ""        -> idx (README of dir)
const BY_BASENAME = {};    // "cheatsheet.md"           -> idx (only if unique)
const BASENAME_DUP = {};

TAB_DATA.forEach((tab, idx) => {
    const path = (tab.path || '').toLowerCase();
    if (path) BY_PATH[path] = idx;
    const base = path.split('/').pop();
    if (base) {
        if (Object.prototype.hasOwnProperty.call(BY_BASENAME, base)) BASENAME_DUP[base] = true;
        else BY_BASENAME[base] = idx;
    }
    if (base === 'readme.md') {
        BY_DIR_README[(tab.dir || '').toLowerCase()] = idx;
    }
});
Object.keys(BASENAME_DUP).forEach(b => { delete BY_BASENAME[b]; });

/* Join a relative href onto a base directory and normalize . / .. segments. */
function joinPath(baseDir, rel) {
    if (rel.charAt(0) === '/') { baseDir = ''; rel = rel.replace(/^\/+/, ''); }
    const parts = (baseDir ? baseDir.split('/') : []).concat(rel.split('/'));
    const out = [];
    for (const p of parts) {
        if (p === '' || p === '.') continue;
        if (p === '..') { out.pop(); continue; }
        out.push(p);
    }
    return out.join('/');
}

function mdTarget(rawHref, baseDir) {
    if (!rawHref || rawHref.charAt(0) === '#') return null;
    if (/^[a-z][a-z0-9+.-]*:\/\//i.test(rawHref) || /^(mailto|tel):/i.test(rawHref)) return null;

    let anchor = '';
    let pathPart = rawHref;
    const hashIdx = pathPart.indexOf('#');
    if (hashIdx >= 0) {
        anchor = pathPart.substring(hashIdx + 1);
        pathPart = pathPart.substring(0, hashIdx);
        try { anchor = decodeURIComponent(anchor); } catch (e) {}
    }
    const qIdx = pathPart.indexOf('?');
    if (qIdx >= 0) pathPart = pathPart.substring(0, qIdx);
    if (!pathPart) return null;

    const joined = joinPath(baseDir || '', pathPart).toLowerCase();
    let idx;
    if (/\.md$/i.test(pathPart)) {
        idx = BY_PATH[joined];
        if (idx === undefined) {
            const base = joined.split('/').pop();
            idx = BY_BASENAME[base];
        }
    } else {
        // a directory reference -> that folder's README
        idx = BY_DIR_README[joined];
    }
    if (idx === undefined) return null;
    return { idx: idx, anchor: anchor };
}

function baseDirOf(node) {
    const panel = node && node.closest ? node.closest('.tab-content') : null;
    return panel ? (panel.dataset.dir || '') : '';
}

/* Tag links so we can style internal navigation distinctly from external ones. */
function classifyLinks() {
    document.querySelectorAll('.tab-content a[href]').forEach(a => {
        const href = a.getAttribute('href');
        if (!href) return;
        if (href.charAt(0) === '#') {
            a.classList.add('anchor-link');
        } else if (mdTarget(href, baseDirOf(a))) {
            a.classList.add('xref-link');
        } else if (/^[a-z][a-z0-9+.-]*:\/\//i.test(href)) {
            a.target = '_blank';
            a.rel = 'noopener noreferrer';
        }
    });
}

function addCopyButton(pre, block) {
    const btn = document.createElement('button');
    btn.className = 'code-copy-btn';
    btn.type = 'button';
    btn.textContent = 'Copy';
    btn.addEventListener('click', () => {
        const text = block.innerText;
        const done = () => {
            btn.textContent = 'Copied';
            btn.classList.add('copied');
            setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1600);
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
        } else {
            fallbackCopy(text, done);
        }
    });
    pre.appendChild(btn);
}

function fallbackCopy(text, done) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); done(); } catch (e) {}
    document.body.removeChild(ta);
}

function highlightAllCode() {
    document.querySelectorAll('.tab-content pre code').forEach(block => {
        if (block.dataset.highlighted === '1') return;
        const pre = block.closest('pre');
        const langClass = Array.from(block.classList).find(c => c.startsWith('language-'));
        if (langClass) {
            const lang = langClass.replace('language-', '');
            const label = document.createElement('span');
            label.className = 'code-lang-label';
            label.textContent = lang;
            pre.appendChild(label);
        }
        hljs.highlightElement(block);
        addCopyButton(pre, block);
        block.dataset.highlighted = '1';
    });
}
