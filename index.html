<pre><code class="language-cpp">/*
 * TYPE ERASURE
 * 
 * DEFINITION:
 * Technique to hide the type of an object behind a generic interface
 * while maintaining value semantics. Allows storing different types
 * in the same container without using inheritance.
 * 
 * PURPOSE:
 * - Store different types in uniform way
 * - No inheritance required from clients
 * - Value semantics (copyable, movable)
 * - Runtime polymorphism without virtual functions in client code
 * 
 * BENEFITS:
 * + Works with any type (even built-in)
 * + No inheritance requirement
 * + Value semantics
 * + Type-safe
 * + Flexible
 * 
 * EXAMPLES IN STL:
 * - std::function
 * - std::any
 * - std::shared_ptr
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;memory&gt;
#include &lt;vector&gt;

using namespace std;

// ============= Example 1: Simple Drawable (Type Erasure) =============

// No base class needed for actual types!
class Circle {
public:
    void draw() const {
        cout &lt;&lt; &quot;Drawing Circle&quot; &lt;&lt; endl;
    }
};

class Square {
public:
    void draw() const {
        cout &lt;&lt; &quot;Drawing Square&quot; &lt;&lt; endl;
    }
};

class Triangle {
public:
    void draw() const {
        cout &lt;&lt; &quot;Drawing Triangle&quot; &lt;&lt; endl;
    }
};

// Type-erased wrapper
class Drawable {
private:
    // Concept (interface)
    struct DrawableConcept {
        virtual ~DrawableConcept() = default;
        virtual void draw() const = 0;
        virtual unique_ptr&lt;DrawableConcept&gt; clone() const = 0;
    };

    // Model (wraps concrete types)
    template &lt;typename T&gt;
    struct DrawableModel : DrawableConcept {
        T object;

        DrawableModel(T obj) : object(move(obj)) {}

        void draw() const override {
            object.draw();  // Calls T::draw()
        }

        unique_ptr&lt;DrawableConcept&gt; clone() const override {
            return make_unique&lt;DrawableModel&gt;(object);
        }
    };

    unique_ptr&lt;DrawableConcept&gt; pImpl;

public:
    // Constructor accepts any type with draw()
    template &lt;typename T&gt;
    Drawable(T obj) : pImpl(make_unique&lt;DrawableModel&lt;T&gt;&gt;(move(obj))) {}

    // Copy constructor
    Drawable(const Drawable&amp; other) : pImpl(other.pImpl-&gt;clone()) {}

    // Copy assignment
    Drawable&amp; operator=(const Drawable&amp; other) {
        if (this != &amp;other) {
            pImpl = other.pImpl-&gt;clone();
        }
        return *this;
    }

    // Move operations
    Drawable(Drawable&amp;&amp;) = default;
    Drawable&amp; operator=(Drawable&amp;&amp;) = default;

    void draw() const {
        pImpl-&gt;draw();
    }
};

// ============= Example 2: Callable (like std::function) =============

template &lt;typename Signature&gt;
class Function;

template &lt;typename R, typename... Args&gt;
class Function&lt;R(Args...)&gt; {
private:
    struct Concept {
        virtual ~Concept() = default;
        virtual R invoke(Args... args) = 0;
        virtual unique_ptr&lt;Concept&gt; clone() const = 0;
    };

    template &lt;typename F&gt;
    struct Model : Concept {
        F func;

        Model(F f) : func(move(f)) {}

        R invoke(Args... args) override {
            return func(forward&lt;Args&gt;(args)...);
        }

        unique_ptr&lt;Concept&gt; clone() const override {
            return make_unique&lt;Model&gt;(func);
        }
    };

    unique_ptr&lt;Concept&gt; pImpl;

public:
    template &lt;typename F&gt;
    Function(F f) : pImpl(make_unique&lt;Model&lt;F&gt;&gt;(move(f))) {}

    Function(const Function&amp; other) : pImpl(other.pImpl-&gt;clone()) {}

    Function&amp; operator=(const Function&amp; other) {
        if (this != &amp;other) {
            pImpl = other.pImpl-&gt;clone();
        }
        return *this;
    }

    Function(Function&amp;&amp;) = default;
    Function&amp; operator=(Function&amp;&amp;) = default;

    R operator()(Args... args) {
        return pImpl-&gt;invoke(forward&lt;Args&gt;(args)...);
    }
};

// ============= Example 3: Printable =============

class Printable {
private:
    struct Concept {
        virtual ~Concept() = default;
        virtual void print() const = 0;
        virtual unique_ptr&lt;Concept&gt; clone() const = 0;
    };

    template &lt;typename T&gt;
    struct Model : Concept {
        T object;

        Model(T obj) : object(move(obj)) {}

        void print() const override {
            cout &lt;&lt; object &lt;&lt; endl;  // Works with any &lt;&lt; operator
        }

        unique_ptr&lt;Concept&gt; clone() const override {
            return make_unique&lt;Model&gt;(object);
        }
    };

    unique_ptr&lt;Concept&gt; pImpl;

public:
    template &lt;typename T&gt;
    Printable(T obj) : pImpl(make_unique&lt;Model&lt;T&gt;&gt;(move(obj))) {}

    Printable(const Printable&amp; other) : pImpl(other.pImpl-&gt;clone()) {}

    Printable&amp; operator=(const Printable&amp; other) {
        if (this != &amp;other) {
            pImpl = other.pImpl-&gt;clone();
        }
        return *this;
    }

    Printable(Printable&amp;&amp;) = default;
    Printable&amp; operator=(Printable&amp;&amp;) = default;

    void print() const {
        pImpl-&gt;print();
    }
};

// ============= Example 4: Any (like std::any) =============

class Any {
private:
    struct Concept {
        virtual ~Concept() = default;
        virtual unique_ptr&lt;Concept&gt; clone() const = 0;
    };

    template &lt;typename T&gt;
    struct Model : Concept {
        T value;

        Model(T val) : value(move(val)) {}

        unique_ptr&lt;Concept&gt; clone() const override {
            return make_unique&lt;Model&gt;(value);
        }
    };

    unique_ptr&lt;Concept&gt; pImpl;

public:
    template &lt;typename T&gt;
    Any(T value) : pImpl(make_unique&lt;Model&lt;T&gt;&gt;(move(value))) {}

    Any(const Any&amp; other) : pImpl(other.pImpl ? other.pImpl-&gt;clone() : nullptr) {}

    Any&amp; operator=(const Any&amp; other) {
        if (this != &amp;other) {
            pImpl = other.pImpl ? other.pImpl-&gt;clone() : nullptr;
        }
        return *this;
    }

    Any(Any&amp;&amp;) = default;
    Any&amp; operator=(Any&amp;&amp;) = default;

    template &lt;typename T&gt;
    T* cast() {
        if (auto model = dynamic_cast&lt;Model&lt;T&gt;*&gt;(pImpl.get())) {
            return &amp;model-&gt;value;
        }
        return nullptr;
    }
};

int main() {
    cout &lt;&lt; &quot;=== TYPE ERASURE ===&quot; &lt;&lt; endl;

    // Example 1: Drawable
    cout &lt;&lt; &quot;\\n1. DRAWABLE TYPE ERASURE:&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;=========================&quot; &lt;&lt; endl;

    shapes.push_back(Circle{});

    cout &lt;&lt; &quot;=========================&quot; &lt;&lt; endl;

    cout &lt;&lt; &quot;add(5, 3) = &quot; &lt;&lt; add(5, 3) &lt;&lt; endl;

    cout &lt;&lt; &quot;\\n\\n=== KEY TAKEAWAYS ===&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;1. Type erasure hides concrete types&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;2. Uses concept/model pattern internally&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;3. No inheritance required from clients&quot; &lt;&lt; endl;
    cout &lt;&lt; &quot;4. Maintains value semantics&quot; &lt;&lt; endl;

    cout &lt;&lt; &quot;• Concept interface (abstract)&quot; &lt;&lt; endl;

<pre><code class="language-cpp">/*
 * SFINAE - Substitution Failure Is Not An Error
 * 
 * DEFINITION:
 * &quot;When substituting template parameters fails, the compiler doesn't
 *  generate an error - it simply removes that overload from consideration.&quot;
 * 
 * PURPOSE:
 * - Enable/disable templates based on type properties
 * - Compile-time introspection
 * - Type trait detection
 * - Overload resolution control
 * 
 * MODERN ALTERNATIVES:
 * - C++17: if constexpr
 * - C++20: Concepts
 * 
 * BENEFITS:
 * + Compile-time type checking
 * + No runtime overhead
 * + Type-safe
 * + Powerful metaprogramming
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;vector&gt;
#include &lt;memory&gt;
#include &lt;type_traits&gt;

using namespace std;

// ============= Example 1: Detect if type has size() method =============

// SFINAE trick to detect size() method
template &lt;typename T&gt;
class has_size_method {
private:
    template &lt;typename U&gt;
    static auto test(int) -&gt; decltype(declval&lt;U&gt;().size(), true_type{});

    template &lt;typename&gt;
    static false_type test(...);

public:
    static constexpr bool value = decltype(test&lt;T&gt;(0))::value;
};

// Use it
template &lt;typename T&gt;
typename enable_if&lt;has_size_method&lt;T&gt;::value, size_t&gt;::type
getSize(const T&amp; container) {
    return container.size();
}

template &lt;typename T&gt;
typename enable_if&lt;!has_size_method&lt;T&gt;::value, size_t&gt;::type
getSize(const T&amp;) {
    return 1;  // Default size for types without size()
}

// ============= Example 2: Enable function only for integral types =============

template &lt;typename T&gt;

// ============= Example 1: Logger =============

// Abstract logger interface
class Logger {
public:
    virtual ~Logger() = default;

    virtual void warning(const string&amp; message) = 0;

class ConsoleLogger : public Logger {
public:
    void log(const string&amp; message) override {
        cout &lt;&lt; &quot;[LOG] &quot; &lt;&lt; message &lt;&lt; endl;
    }

    void error(const string&amp; message) override {
        cout &lt;&lt; &quot;[ERROR] &quot; &lt;&lt; message &lt;&lt; endl;
    }

    void warning(const string&amp; message) override {
        cout &lt;&lt; &quot;[WARNING] &quot; &lt;&lt; message &lt;&lt; endl;
    }
};

// Null Object - Does nothing (no-op)
class NullLogger : public Logger {
public:
    void log(const string&amp;) override {
        // Do nothing
    }

    void error(const string&amp;) override {
        // Do nothing
    }

    void warning(const string&amp;) override {
        // Do nothing
    }
};

private:

public:

    void run() {

        logger-&gt;log(&quot;Application started&quot;);
        logger-&gt;warning(&quot;Low memory&quot;);
        logger-&gt;error(&quot;Failed to connect&quot;);
        logger-&gt;log(&quot;Application finished&quot;);
    }
};

class Customer {
public:

    virtual string getName() const = 0;
    virtual double getDiscount() const = 0;
    virtual void addOrder(double amount) = 0;
    virtual bool isNull() const { return false; }
};

class RealCustomer : public Customer {
private:
    string name;
    double totalSpent;

public:
    RealCustomer(const string&amp; n) : name(n), totalSpent(0) {}

    string getName() const override {
        return name;
    }

    double getDiscount() const override {
        if (totalSpent &gt; 1000) return 0.1;
        if (totalSpent &gt; 500) return 0.05;
        return 0.0;
    }

    void addOrder(double amount) override {
        totalSpent += amount;
        cout &lt;&lt; name &lt;&lt; &quot; ordered $&quot; &lt;&lt; amount &lt;&lt; endl;
    }
};

class NullCustomer : public Customer {
public:
    string getName() const override {
        return &quot;Guest&quot;;
    }

    double getDiscount() const override {
        return 0.0;
    }

    void addOrder(double) override {
        // Do nothing
    }

    bool isNull() const override {
        return true;
    }
};

class CustomerFactory {
private:
    static inline shared_ptr&lt;Customer&gt; nullCustomer = make_shared&lt;NullCustomer&gt;();

public:
    static shared_ptr&lt;Customer&gt; getCustomer(const string&amp; name) {
        if (name == &quot;Alice&quot;) return make_shared&lt;RealCustomer&gt;(&quot;Alice&quot;);

        return nullCustomer;  // Return null object instead of nullptr
    }
};

class Command {

    virtual void execute() = 0;
};

public:

        cout &lt;&lt; &quot;Saving file...&quot; &lt;&lt; endl;
    }
};

class PrintCommand : public Command {
public:
    void execute() override {
        cout &lt;&lt; &quot;Printing document...&quot; &lt;&lt; endl;
    }
};

class NullCommand : public Command {
public:
    void execute() override {
        // Do nothing
    }
};

class CommandProcessor {
private:
    shared_ptr&lt;Command&gt; lastCommand;
    static inline shared_ptr&lt;Command&gt; nullCommand = make_shared&lt;NullCommand&gt;();

public:
    CommandProcessor() : lastCommand(nullCommand) {}

    void setCommand(shared_ptr&lt;Command&gt; cmd) {
        lastCommand = cmd ? cmd : nullCommand;
    }

    void executeLastCommand() {
        // No null check needed!
        lastCommand-&gt;execute();
    }
};

 * 
 * DEFINITION:

 * 
 * BENEFITS:
 * + Better performance (no repeated allocation)
 * + Controlled resource usage
 * + Predictable memory usage
 * + Reduced GC pressure
 * 
 * WHEN TO USE:
 * - Objects are expensive to create
 * - Need many short-lived objects
 * - Want to limit resource usage
 * - Database connections, threads, network sockets
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;memory&gt;
#include &lt;vector&gt;
#include &lt;queue&gt;
#include &lt;mutex&gt;
#include &lt;thread&gt;
#include &lt;chrono&gt;

using namespace std;

// ============= Example 1: Simple Object Pool =============

class DatabaseConnection {
private:
    int id;
    bool inUse;

public:
    DatabaseConnection(int connId) : id(connId), inUse(false) {
        cout &lt;&lt; &quot;Creating expensive DatabaseConnection #&quot; &lt;&lt; id &lt;&lt; endl;
        this_thread::sleep_for(chrono::milliseconds(100));  // Simulate expensive creation
    }

    void connect() {
        cout &lt;&lt; &quot;Connection #&quot; &lt;&lt; id &lt;&lt; &quot; connected&quot; &lt;&lt; endl;
    }

    void disconnect() {
        cout &lt;&lt; &quot;Connection #&quot; &lt;&lt; id &lt;&lt; &quot; disconnected&quot; &lt;&lt; endl;
    }

    void executeQuery(const string&amp; query) {
        cout &lt;&lt; &quot;Connection #&quot; &lt;&lt; id &lt;&lt; &quot; executing: &quot; &lt;&lt; query &lt;&lt; endl;
    }

    int getId() const { return id; }
    bool isInUse() const { return inUse; }
    void setInUse(bool use) { inUse = use; }
};

class ConnectionPool {
private:
    vector&lt;unique_ptr&lt;DatabaseConnection&gt;&gt; pool;
    queue&lt;DatabaseConnection*&gt; available;
    mutex mtx;
    size_t maxSize;

public:
    ConnectionPool(size_t size) : maxSize(size) {
        cout &lt;&lt; &quot;Creating connection pool with &quot; &lt;&lt; size &lt;&lt; &quot; connections...&quot; &lt;&lt; endl;
        for (size_t i = 0; i &lt; size; ++i) {
            auto conn = make_unique&lt;DatabaseConnection&gt;(i + 1);
            available.push(conn.get());
            pool.push_back(move(conn));
        }
        cout &lt;&lt; &quot;Connection pool ready!&quot; &lt;&lt; endl;
    }

    DatabaseConnection* acquire() {
        lock_guard&lt;mutex&gt; lock(mtx);
        if (available.empty()) {
            cout &lt;&lt; &quot;No connections available!&quot; &lt;&lt; endl;
            return nullptr;
        }

        DatabaseConnection* conn = available.front();
        available.pop();
        conn-&gt;setInUse(true);
        cout &lt;&lt; &quot;Acquired connection #&quot; &lt;&lt; conn-&gt;getId() &lt;&lt; endl;
        return conn;
    }

    void release(DatabaseConnection* conn) {
        lock_guard&lt;mutex&gt; lock(mtx);
        conn-&gt;setInUse(false);
        available.push(conn);
        cout &lt;&lt; &quot;Released connection #&quot; &lt;&lt; conn-&gt;getId() &lt;&lt; &quot; back to pool&quot; &lt;&lt; endl;
    }

    size_t getAvailableCount() const {
        return available.size();
    }
};

// ============= Example 2: Thread Pool =============

class Worker {
private:
    int id;

public:
    Worker(int workerId) : id(workerId) {
        cout &lt;&lt; &quot;Worker #&quot; &lt;&lt; id &lt;&lt; &quot; created&quot; &lt;&lt; endl;
    }

    void doWork(const string&amp; task) {
        cout &lt;&lt; &quot;Worker #&quot; &lt;&lt; id &lt;&lt; &quot; processing: &quot; &lt;&lt; task &lt;&lt; endl;
        this_thread::sleep_for(chrono::milliseconds(50));
    }

    int getId() const { return id; }
};

class ThreadPool {
private:
    vector&lt;unique_ptr&lt;Worker&gt;&gt; workers;
    queue&lt;Worker*&gt; available;
    mutex mtx;

public:
    ThreadPool(size_t size) {
        for (size_t i = 0; i &lt; size; ++i) {
            auto worker = make_unique&lt;Worker&gt;(i + 1);
            available.push(worker.get());
            workers.push_back(move(worker));
        }
        cout &lt;&lt; &quot;Thread pool with &quot; &lt;&lt; size &lt;&lt; &quot; workers ready&quot; &lt;&lt; endl;
    }

    Worker* getWorker() {
        lock_guard&lt;mutex&gt; lock(mtx);
        if (available.empty()) return nullptr;

        Worker* worker = available.front();
        available.pop();
        return worker;
    }

    void returnWorker(Worker* worker) {
        lock_guard&lt;mutex&gt; lock(mtx);
        available.push(worker);
    }
};

// ============= Example 3: Memory Buffer Pool =============

class Buffer {
private:
    vector&lt;char&gt; data;
    size_t size;

public:
    Buffer(size_t s) : data(s), size(s) {
        cout &lt;&lt; &quot;Allocated buffer of &quot; &lt;&lt; size &lt;&lt; &quot; bytes&quot; &lt;&lt; endl;
    }

    void write(const string&amp; content) {
        for (size_t i = 0; i &lt; content.length() &amp;&amp; i &lt; size; ++i) {
            data[i] = content[i];
        }
    }

    void clear() {
        fill(data.begin(), data.end(), 0);
    }

    size_t getSize() const { return size; }
};

class BufferPool {
private:
    vector&lt;unique_ptr&lt;Buffer&gt;&gt; buffers;
    queue&lt;Buffer*&gt; available;
    size_t bufferSize;

public:
    BufferPool(size_t poolSize, size_t bufSize) : bufferSize(bufSize) {
        for (size_t i = 0; i &lt; poolSize; ++i) {
            auto buffer = make_unique&lt;Buffer&gt;(bufferSize);
            available.push(buffer.get());
            buffers.push_back(move(buffer));
        }
        cout &lt;&lt; &quot;Buffer pool with &quot; &lt;&lt; poolSize &lt;&lt; &quot; buffers ready&quot; &lt;&lt; endl;
    }

    Buffer* acquire() {
        if (available.empty()) return nullptr;
        Buffer* buffer = available.front();
        available.pop();
        buffer-&gt;clear();  // Reset buffer
        return buffer;
    }

    void release(Buffer* buffer) {
        available.push(buffer);
    }
};

// ============= Example 4: Particle System (Game Dev) =============

class Particle {
private:
    double x, y;
    double velocityX, velocityY;
    bool active;

public:
    Particle() : x(0), y(0), velocityX(0), velocityY(0), active(false) {}

    void init(double posX, double posY, double velX, double velY) {
        x = posX;
        y = posY;
        velocityX = velX;
        velocityY = velY;
        active = true;
    }

    void update() {
        if (active) {
            x += velocityX;
            y += velocityY;
        }
    }

    void deactivate() {
        active = false;
    }

    bool isActive() const { return active; }
    double getX() const { return x; }
    double getY() const { return y; }
};

class ParticlePool {
private:
    vector&lt;Particle&gt; particles;
    size_t nextAvailable;

public:
    ParticlePool(size_t size) : particles(size), nextAvailable(0) {
        cout &lt;&lt; &quot;Particle pool with &quot; &lt;&lt; size &lt;&lt; &quot; particles created&quot; &lt;&lt; endl;
    }

    Particle* spawn(double x, double y, double velX, double velY) {
        // Find inactive particle
        for (size_t i = 0; i &lt; particles.size(); ++i) {
            if (!particles[i].isActive()) {
                particles[i].init(x, y, velX, velY);
                cout &lt;&lt; &quot;Spawned particle at (&quot; &lt;&lt; x &lt;&lt; &quot;, &quot; &lt;&lt; y &lt;&lt; &quot;)&quot; &lt;&lt; endl;
                return &amp;particles[i];
            }
        }
        cout &lt;&lt; &quot;Pool exhausted! No available particles&quot; &lt;&lt; endl;
        return nullptr;
    }

    void updateAll() {
        for (auto&amp; particle : particles) {
            if (particle.isActive()) {
                particle.update();
            }
        }
    }

    size_t getActiveCount() const {
        size_t count = 0;
        for (const auto&amp; particle : particles) {
            if (particle.isActive()) ++count;
        }
        return count;
    }
};

<pre><code class="language-cpp">/*
 * POLICY-BASED DESIGN
 * Also known as: Policy Pattern, Strategy at Compile Time
 * 
 * DEFINITION:
 * Use template parameters to define behavior policies at compile time.
 * Combine small, focused policy classes to create flexible designs.
 * 
 * PURPOSE:
 * - Compose behavior at compile time
 * - Zero runtime overhead
 * - Highly flexible and reusable
 * - Type-safe configuration
 * 
 * BENEFITS:
 * + Compile-time polymorphism (faster)
 * + No virtual function overhead
 * + Highly flexible
 * + Can be inlined
 * + Type-safe
 * 
 * POPULARIZED BY:
 * - Andrei Alexandrescu's &quot;Modern C++ Design&quot;
 * - Used extensively in C++ libraries
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;memory&gt;
#include &lt;mutex&gt;
#include &lt;vector&gt;

using namespace std;

// ============= Example 1: Smart Pointer with Policies =============

// Ownership policies
struct RefCounted {
    int count = 1;
    void acquire() { ++count; }
    void release() { --count; }
    bool shouldDelete() { return count == 0; }
};

struct DeepCopy {
    template &lt;typename T&gt;
    static T* clone(const T* ptr) {
        return ptr ? new T(*ptr) : nullptr;
    }
};

struct NoCopy {
    template &lt;typename T&gt;
    static T* clone(const T*) {
        throw runtime_error(&quot;Copying not allowed&quot;);
    }
};

// Deletion policies
struct DeleteByOperator {
    template &lt;typename T&gt;
    static void destroy(T* ptr) {
        delete ptr;
        cout &lt;&lt; &quot;Deleted with operator delete&quot; &lt;&lt; endl;
    }
};

struct DeleteByFree {
    template &lt;typename T&gt;
    static void destroy(T* ptr) {
        ptr-&gt;~T();
        free(ptr);
        cout &lt;&lt; &quot;Deleted with free()&quot; &lt;&lt; endl;
    }
};

// Smart pointer with policies
template &lt;typename T,
          typename OwnershipPolicy = RefCounted,
          typename CopyPolicy = DeepCopy,
          typename DeletionPolicy = DeleteByOperator&gt;
class SmartPtr {
private:
    T* ptr;
    OwnershipPolicy ownership;

public:
    explicit SmartPtr(T* p = nullptr) : ptr(p) {
        cout &lt;&lt; &quot;SmartPtr created&quot; &lt;&lt; endl;
    }

    SmartPtr(const SmartPtr&amp; other) : ptr(CopyPolicy::clone(other.ptr)) {
        cout &lt;&lt; &quot;SmartPtr copied&quot; &lt;&lt; endl;
    }

    ~SmartPtr() {
        if (ptr) {
            DeletionPolicy::destroy(ptr);
        }
    }

    T&amp; operator*() { return *ptr; }
    T* operator-&gt;() { return ptr; }
};

// ============= Example 2: Container with Allocation Policy =============

// Allocation policies
class MallocAllocator {
public:
    template &lt;typename T&gt;
    static T* allocate(size_t n) {
        cout &lt;&lt; &quot;Allocating with malloc: &quot; &lt;&lt; n &lt;&lt; &quot; elements&quot; &lt;&lt; endl;
        return static_cast&lt;T*&gt;(malloc(n * sizeof(T)));
    }

    template &lt;typename T&gt;
    static void deallocate(T* ptr) {
        cout &lt;&lt; &quot;Deallocating with free&quot; &lt;&lt; endl;
        free(ptr);
    }
};

class NewAllocator {
public:
    template &lt;typename T&gt;
    static T* allocate(size_t n) {
        cout &lt;&lt; &quot;Allocating with new: &quot; &lt;&lt; n &lt;&lt; &quot; elements&quot; &lt;&lt; endl;
        return new T[n];
    }

    template &lt;typename T&gt;
    static void deallocate(T* ptr) {
        cout &lt;&lt; &quot;Deallocating with delete[]&quot; &lt;&lt; endl;
        delete[] ptr;
    }
};

// Container with allocation policy
template &lt;typename T, typename Allocator = NewAllocator&gt;
class Vector {
private:
    T* data;
    size_t size;
    size_t capacity;

public:
    Vector(size_t cap = 10) : size(0), capacity(cap) {
        data = Allocator::template allocate&lt;T&gt;(capacity);
    }

    ~Vector() {
        Allocator::template deallocate&lt;T&gt;(data);
    }

    void push_back(const T&amp; value) {
        if (size &lt; capacity) {
            data[size++] = value;
        }
    }

    T&amp; operator[](size_t index) { return data[index]; }
    size_t getSize() const { return size; }
};

// ============= Example 3: Thread Safety Policy =============

// Threading policies
class SingleThreaded {
public:
    void lock() { /* no-op */ }
    void unlock() { /* no-op */ }
};

class MultiThreaded {
private:
    mutex mtx;
public:
    void lock() { mtx.lock(); }
    void unlock() { mtx.unlock(); }
};

// Counter with threading policy
template &lt;typename ThreadingPolicy = SingleThreaded&gt;
class Counter {
private:
    int value;
    ThreadingPolicy threadPolicy;

public:
    Counter() : value(0) {}

    void increment() {
        threadPolicy.lock();
        ++value;
        threadPolicy.unlock();
    }

    int get() {
        threadPolicy.lock();
        int v = value;
        threadPolicy.unlock();
        return v;
    }
};

// ============= Example 5: Validation Policy =============

// Validation policies
class NoValidation {
public:
    template &lt;typename T&gt;
    static bool validate(const T&amp;) {
        return true;
    }
};

class RangeValidation {
public:
    static bool validate(int value) {
        bool valid = value &gt;= 0 &amp;&amp; value &lt;= 100;
        if (!valid) cout &lt;&lt; &quot;Validation failed: &quot; &lt;&lt; value &lt;&lt; endl;
        return valid;
    }
};

// Data class with validation policy
template &lt;typename T, typename ValidationPolicy = NoValidation&gt;
class ValidatedData {
private:
    T value;

public:
    void setValue(const T&amp; v) {
        if (ValidationPolicy::validate(v)) {
            value = v;
            cout &lt;&lt; &quot;Value set to: &quot; &lt;&lt; value &lt;&lt; endl;
        } else {
            cout &lt;&lt; &quot;Invalid value rejected&quot; &lt;&lt; endl;
        }
    }

    T getValue() const { return value; }
};

// ============= Example 6: Sorting Strategy Policy =============

// Sorting policies
class BubbleSort {
public:
    template &lt;typename T&gt;
    static void sort(T* arr, size_t n) {
        cout &lt;&lt; &quot;Using Bubble Sort&quot; &lt;&lt; endl;
        for (size_t i = 0; i &lt; n - 1; ++i) {
            for (size_t j = 0; j &lt; n - i - 1; ++j) {
                if (arr[j] &gt; arr[j + 1]) {
                    swap(arr[j], arr[j + 1]);
                }
            }
        }
    }
};

class QuickSort {
public:
    template &lt;typename T&gt;
    static void sort(T* arr, size_t n) {
        cout &lt;&lt; &quot;Using Quick Sort&quot; &lt;&lt; endl;
        // Simplified - just for demonstration
        for (size_t i = 0; i &lt; n - 1; ++i) {
            for (size_t j = i + 1; j &lt; n; ++j) {
                if (arr[i] &gt; arr[j]) {
                    swap(arr[i], arr[j]);
                }
            }
        }
    }
};

// Sorter with sorting policy
template &lt;typename SortPolicy = QuickSort&gt;
class Sorter {
public:
    template &lt;typename T&gt;
    static void sortArray(T* arr, size_t n) {
        SortPolicy::template sort(arr, n);
    }
};

<pre><code class="language-cpp">/*
 * CHAIN OF RESPONSIBILITY PATTERN - Behavioral Pattern
 * 
 * PURPOSE:
 * Passes requests along a chain of handlers. Each handler decides either
 * to process the request or to pass it to the next handler in the chain.
 * 
 * WHEN TO USE:
 * - More than one object can handle a request, and handler isn't known a priori
 * - Want to issue request to one of several objects without specifying receiver
 * - Set of objects that can handle request should be specified dynamically
 * 
 * PROS:
 * + Decouples sender and receiver
 * + Adds/removes responsibilities dynamically
 * + Flexible assignment of responsibilities
 * + Single Responsibility Principle
 * + Open/Closed Principle
 * 
 * CONS:
 * - Request might not be handled (end of chain)
 * - Can be hard to debug/observe
 * - Performance concerns with long chains
 * 
 * REAL-WORLD EXAMPLES:
 * - Event handling in GUI frameworks
 * - Logging frameworks (log levels)
 * - Support ticket systems
 * - Authentication/authorization chains
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;memory&gt;

using namespace std;

// ============= Example 1: Support Ticket System =============

enum class Priority { LOW, MEDIUM, HIGH, CRITICAL };

class SupportTicket {
public:
    Priority priority;
    string description;

    SupportTicket(Priority p, const string&amp; desc) 
        : priority(p), description(desc) {}
};

// Handler interface
class SupportHandler {
protected:
    shared_ptr&lt;SupportHandler&gt; nextHandler;

public:
    virtual ~SupportHandler() = default;

    void setNext(shared_ptr&lt;SupportHandler&gt; handler) {
        nextHandler = handler;
    }

    virtual void handleTicket(const SupportTicket&amp; ticket) {
        if (nextHandler) {
            nextHandler-&gt;handleTicket(ticket);
        } else {
            cout &lt;&lt; &quot;No handler available for this ticket!&quot; &lt;&lt; endl;
        }
    }
};

// Concrete Handlers
class Level1Support : public SupportHandler {
public:
    void handleTicket(const SupportTicket&amp; ticket) override {
        if (ticket.priority == Priority::LOW) {
            cout &lt;&lt; &quot;[Level 1 Support] Handling: &quot; &lt;&lt; ticket.description &lt;&lt; endl;
        } else {
            cout &lt;&lt; &quot;[Level 1 Support] Escalating ticket...&quot; &lt;&lt; endl;
            SupportHandler::handleTicket(ticket);
        }
    }
};

class Level2Support : public SupportHandler {
public:
    void handleTicket(const SupportTicket&amp; ticket) override {
        if (ticket.priority == Priority::MEDIUM) {
            cout &lt;&lt; &quot;[Level 2 Support] Handling: &quot; &lt;&lt; ticket.description &lt;&lt; endl;
        } else {
            cout &lt;&lt; &quot;[Level 2 Support] Escalating ticket...&quot; &lt;&lt; endl;
            SupportHandler::handleTicket(ticket);
        }
    }
};

class Level3Support : public SupportHandler {
public:
    void handleTicket(const SupportTicket&amp; ticket) override {
        if (ticket.priority == Priority::HIGH) {
            cout &lt;&lt; &quot;[Level 3 Support] Handling: &quot; &lt;&lt; ticket.description &lt;&lt; endl;
        } else {
            cout &lt;&lt; &quot;[Level 3 Support] Escalating to management...&quot; &lt;&lt; endl;
            SupportHandler::handleTicket(ticket);
        }
    }
};

class ManagementSupport : public SupportHandler {
public:
    void handleTicket(const SupportTicket&amp; ticket) override {
        cout &lt;&lt; &quot;[Management] Handling CRITICAL issue: &quot; &lt;&lt; ticket.description &lt;&lt; endl;
    }
};

// ============= Example 2: Logging System =============

enum class LogLevel { DEBUG, INFO, WARNING, ERROR };

class LogMessage {
public:
    LogLevel level;
    string message;

    LogMessage(LogLevel l, const string&amp; msg) : level(l), message(msg) {}
};

// Handler
class Logger {
protected:
    LogLevel level;
    shared_ptr&lt;Logger&gt; next;

public:
    Logger(LogLevel l) : level(l), next(nullptr) {}

    void setNext(shared_ptr&lt;Logger&gt; logger) {
        next = logger;
    }

    void log(const LogMessage&amp; msg) {
        if (msg.level &gt;= level) {
            writeMessage(msg);
        }
        if (next) {
            next-&gt;log(msg);
        }
    }

    virtual void writeMessage(const LogMessage&amp; msg) = 0;
    virtual ~Logger() = default;
};

// Concrete Handlers
class ConsoleLogger : public Logger {
public:
    ConsoleLogger(LogLevel level) : Logger(level) {}

    void writeMessage(const LogMessage&amp; msg) override {
        cout &lt;&lt; &quot;[CONSOLE] &quot; &lt;&lt; getMessage(msg) &lt;&lt; endl;
    }

private:
    string getMessage(const LogMessage&amp; msg) {
        string levelStr;
        switch(msg.level) {
            case LogLevel::DEBUG: levelStr = &quot;DEBUG&quot;; break;
            case LogLevel::INFO: levelStr = &quot;INFO&quot;; break;
            case LogLevel::WARNING: levelStr = &quot;WARNING&quot;; break;
            case LogLevel::ERROR: levelStr = &quot;ERROR&quot;; break;
        }
        return levelStr + &quot;: &quot; + msg.message;
    }
};

class FileLogger : public Logger {
public:
    FileLogger(LogLevel level) : Logger(level) {}

    void writeMessage(const LogMessage&amp; msg) override {
        cout &lt;&lt; &quot;[FILE] Writing to log.txt: &quot; &lt;&lt; msg.message &lt;&lt; endl;
    }
};

class EmailLogger : public Logger {
public:
    EmailLogger(LogLevel level) : Logger(level) {}

    void writeMessage(const LogMessage&amp; msg) override {
        cout &lt;&lt; &quot;[EMAIL] Sending alert: &quot; &lt;&lt; msg.message &lt;&lt; endl;
    }
};

// ============= Example 3: Approval Chain =============

class PurchaseRequest {
public:
    double amount;
    string purpose;

    PurchaseRequest(double amt, const string&amp; purp) 
        : amount(amt), purpose(purp) {}
};

// Handler
class Approver {
protected:
    shared_ptr&lt;Approver&gt; successor;
    double approvalLimit;
    string title;

public:
    Approver(const string&amp; t, double limit) 
        : title(t), approvalLimit(limit), successor(nullptr) {}

    void setSuccessor(shared_ptr&lt;Approver&gt; next) {
        successor = next;
    }

    virtual void processRequest(const PurchaseRequest&amp; request) {
        if (request.amount &lt;= approvalLimit) {
            cout &lt;&lt; title &lt;&lt; &quot; approves $&quot; &lt;&lt; request.amount 
                 &lt;&lt; &quot; for: &quot; &lt;&lt; request.purpose &lt;&lt; endl;
        } else if (successor) {
            cout &lt;&lt; title &lt;&lt; &quot; cannot approve. Forwarding...&quot; &lt;&lt; endl;
            successor-&gt;processRequest(request);
        } else {
            cout &lt;&lt; &quot;Request for $&quot; &lt;&lt; request.amount 
                 &lt;&lt; &quot; exceeds all approval limits!&quot; &lt;&lt; endl;
        }
    }

    virtual ~Approver() = default;
};

// Concrete Handlers
class TeamLead : public Approver {
public:
    TeamLead() : Approver(&quot;Team Lead&quot;, 1000.0) {}
};

class Manager : public Approver {
public:
    Manager() : Approver(&quot;Manager&quot;, 5000.0) {}
};

class Director : public Approver {
public:
    Director() : Approver(&quot;Director&quot;, 20000.0) {}
};

class CEO : public Approver {
public:
    CEO() : Approver(&quot;CEO&quot;, 100000.0) {}
};

    auto level2 = make_shared&lt;Level2Support&gt;();
    auto level3 = make_shared&lt;Level3Support&gt;();
    auto management = make_shared&lt;ManagementSupport&gt;();

    level1-&gt;setNext(level2);
    level2-&gt;setNext(level3);
    level3-&gt;setNext(management);

    // Process tickets
    cout &lt;&lt; &quot;\\n[Ticket 1]&quot; &lt;&lt; endl;
    SupportTicket ticket1(Priority::LOW, &quot;Password reset request&quot;);
    level1-&gt;handleTicket(ticket1);

    SupportTicket ticket2(Priority::MEDIUM, &quot;Software installation issue&quot;);

    level1-&gt;handleTicket(ticket3);

    SupportTicket ticket4(Priority::CRITICAL, &quot;Security breach detected&quot;);

<pre><code class="language-cpp">/*
 * COMMAND PATTERN - Behavioral Pattern
 * 
 * PURPOSE:
 * Encapsulates a request as an object, thereby letting you parameterize clients
 * with different requests, queue or log requests, and support undoable operations.
 * 
 * WHEN TO USE:
 * - Want to parameterize objects with operations
 * - Want to queue operations, schedule execution, or execute remotely
 * - Want to support undo/redo functionality
 * - Want to log changes for crash recovery
 * - Want to structure system around high-level operations
 * 
 * PROS:
 * + Decouples invoker from receiver
 * + Can assemble commands into composite commands
 * + Easy to add new commands (Open/Closed)
 * + Supports undo/redo
 * + Supports deferred execution
 * 
 * CONS:
 * - Increases number of classes
 * - Can be overkill for simple operations
 * 
 * REAL-WORLD EXAMPLES:
 * - Text editor (undo/redo)
 * - GUI buttons and menu items
 * - Task scheduling
 * - Database transactions
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;memory&gt;
#include &lt;vector&gt;
#include &lt;stack&gt;

using namespace std;

// ============= Example 1: Text Editor with Undo/Redo =============

// Receiver
class TextDocument {
private:
    string text;

public:
    void insertText(const string&amp; newText) {
        text += newText;
        cout &lt;&lt; &quot;Inserted: \\&quot;&quot; &lt;&lt; newText &lt;&lt; &quot;\\&quot;&quot; &lt;&lt; endl;
    }

    void deleteText(int length) {
        if (length &lt;= text.length()) {
            text = text.substr(0, text.length() - length);
            cout &lt;&lt; &quot;Deleted &quot; &lt;&lt; length &lt;&lt; &quot; characters&quot; &lt;&lt; endl;
        }
    }

    void replaceText(const string&amp; oldText, const string&amp; newText) {
        size_t pos = text.find(oldText);
        if (pos != string::npos) {
            text.replace(pos, oldText.length(), newText);
            cout &lt;&lt; &quot;Replaced \\&quot;&quot; &lt;&lt; oldText &lt;&lt; &quot;\\&quot; with \\&quot;&quot; &lt;&lt; newText &lt;&lt; &quot;\\&quot;&quot; &lt;&lt; endl;
        }
    }

    string getText() const { return text; }

    void display() const {
        cout &lt;&lt; &quot;Current text: \\&quot;&quot; &lt;&lt; text &lt;&lt; &quot;\\&quot;&quot; &lt;&lt; endl;
    }
};

// Command interface
class Command {
public:
    virtual ~Command() = default;
    virtual void execute() = 0;
    virtual void undo() = 0;
};

// Concrete Commands
class InsertCommand : public Command {
private:
    TextDocument&amp; doc;
    string text;

public:
    InsertCommand(TextDocument&amp; d, const string&amp; t) : doc(d), text(t) {}

    void execute() override {
        doc.insertText(text);
    }

    void undo() override {
        doc.deleteText(text.length());
    }
};

class DeleteCommand : public Command {
private:
    TextDocument&amp; doc;
    string deletedText;
    int length;

public:
    DeleteCommand(TextDocument&amp; d, int len) : doc(d), length(len) {
        // Save text before deletion for undo
        string currentText = doc.getText();
        if (len &lt;= currentText.length()) {
            deletedText = currentText.substr(currentText.length() - len);
        }
    }

    void execute() override {
        doc.deleteText(length);
    }

    void undo() override {
        doc.insertText(deletedText);
    }
};

// Invoker
class TextEditor {
private:
    stack&lt;shared_ptr&lt;Command&gt;&gt; undoStack;
    stack&lt;shared_ptr&lt;Command&gt;&gt; redoStack;

public:
    void executeCommand(shared_ptr&lt;Command&gt; command) {
        command-&gt;execute();
        undoStack.push(command);
        // Clear redo stack when new command is executed
        while (!redoStack.empty()) redoStack.pop();
    }

    void undo() {
        if (!undoStack.empty()) {
            shared_ptr&lt;Command&gt; command = undoStack.top();
            undoStack.pop();
            command-&gt;undo();
            redoStack.push(command);
            cout &lt;&lt; &quot;Undo performed&quot; &lt;&lt; endl;
        } else {
            cout &lt;&lt; &quot;Nothing to undo&quot; &lt;&lt; endl;
        }
    }

    void redo() {
        if (!redoStack.empty()) {
            shared_ptr&lt;Command&gt; command = redoStack.top();
            redoStack.pop();
            command-&gt;execute();
            undoStack.push(command);
            cout &lt;&lt; &quot;Redo performed&quot; &lt;&lt; endl;
        } else {
            cout &lt;&lt; &quot;Nothing to redo&quot; &lt;&lt; endl;
        }
    }
};

// Macro Command (composite)
class MacroCommand : public Command {
private:
    vector&lt;shared_ptr&lt;Command&gt;&gt; commands;

public:
    void addCommand(shared_ptr&lt;Command&gt; cmd) {
        commands.push_back(cmd);
    }

    void execute() override {
        cout &lt;&lt; &quot;\\n[Executing Macro Command]&quot; &lt;&lt; endl;
        for (auto&amp; cmd : commands) {
            cmd-&gt;execute();
        }
    }

    void undo() override {
        cout &lt;&lt; &quot;\\n[Undoing Macro Command]&quot; &lt;&lt; endl;
        for (auto it = commands.rbegin(); it != commands.rend(); ++it) {
            (*it)-&gt;undo();
        }
    }
};

<pre><code class="language-cpp">/*
 * ITERATOR PATTERN - Behavioral Pattern
 * 
 * PURPOSE:
 * Provides a way to access elements of an aggregate object sequentially
 * without exposing its underlying representation.
 * 
 * WHEN TO USE:
 * - Need to access contents of aggregate without exposing internal structure
 * - Need to support multiple traversals of aggregate objects
 * - Want uniform interface for traversing different structures
 * 
 * PROS:
 * + Simplifies aggregate interface
 * + Multiple iterators and traversals can be active
 * + Single Responsibility: separates traversal from collection
 * + Open/Closed: can add new iterators without changing collection
 * 
 * CONS:
 * - Overkill for simple collections
 * - Can be less efficient than direct access
 * 
 * REAL-WORLD EXAMPLES:
 * - STL iterators (C++)
 * - Java Collections
 * - Database cursors
 * - File system traversal
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;vector&gt;
#include &lt;memory&gt;

using namespace std;

// ============= Example 1: Book Collection =============

class Book {
private:
    string title;
    string author;

public:
    Book(const string&amp; t, const string&amp; a) : title(t), author(a) {}

    string getTitle() const { return title; }
    string getAuthor() const { return author; }

    void display() const {
        cout &lt;&lt; &quot;\\&quot;&quot; &lt;&lt; title &lt;&lt; &quot;\\&quot; by &quot; &lt;&lt; author &lt;&lt; endl;
    }
};

// Iterator interface
template&lt;typename T&gt;
class Iterator {
public:
    virtual ~Iterator() = default;
    virtual bool hasNext() const = 0;
    virtual T next() = 0;
    virtual void reset() = 0;
};

// Aggregate interface
template&lt;typename T&gt;
class Collection {
public:
    virtual ~Collection() = default;
    virtual shared_ptr&lt;Iterator&lt;T&gt;&gt; createIterator() = 0;
};

// Concrete Collection
class BookCollection : public Collection&lt;Book&gt; {
private:
    vector&lt;Book&gt; books;

public:
    void addBook(const Book&amp; book) {
        books.push_back(book);
    }

    int size() const { return books.size(); }

    Book&amp; getAt(int index) { return books[index]; }

    // Factory method for iterator
    shared_ptr&lt;Iterator&lt;Book&gt;&gt; createIterator() override;

    friend class BookIterator;
};

// Concrete Iterator
class BookIterator : public Iterator&lt;Book&gt; {
private:
    BookCollection&amp; collection;
    int currentIndex;

public:
    BookIterator(BookCollection&amp; coll) : collection(coll), currentIndex(0) {}

    bool hasNext() const override {
        return currentIndex &lt; collection.size();
    }

    Book next() override {
        return collection.getAt(currentIndex++);
    }

    void reset() override {
        currentIndex = 0;
    }
};

shared_ptr&lt;Iterator&lt;Book&gt;&gt; BookCollection::createIterator() {
    return make_shared&lt;BookIterator&gt;(*this);
}

// ============= Example 2: Tree Traversal =============

template&lt;typename T&gt;
class TreeNode {
public:
    T data;
    shared_ptr&lt;TreeNode&lt;T&gt;&gt; left;
    shared_ptr&lt;TreeNode&lt;T&gt;&gt; right;

    TreeNode(T val) : data(val), left(nullptr), right(nullptr) {}
};

template&lt;typename T&gt;
class BinaryTree {
private:
    shared_ptr&lt;TreeNode&lt;T&gt;&gt; root;

public:
    BinaryTree() : root(nullptr) {}

    void setRoot(shared_ptr&lt;TreeNode&lt;T&gt;&gt; node) { root = node; }
    shared_ptr&lt;TreeNode&lt;T&gt;&gt; getRoot() const { return root; }

    // Different iterator types
    shared_ptr&lt;Iterator&lt;T&gt;&gt; createInOrderIterator();
    shared_ptr&lt;Iterator&lt;T&gt;&gt; createPreOrderIterator();
};

// InOrder Iterator (Left -&gt; Root -&gt; Right)
template&lt;typename T&gt;
class InOrderIterator : public Iterator&lt;T&gt; {
private:
    vector&lt;T&gt; elements;
    int currentIndex;

    void inOrderTraversal(shared_ptr&lt;TreeNode&lt;T&gt;&gt; node) {
        if (node) {
            inOrderTraversal(node-&gt;left);
            elements.push_back(node-&gt;data);
            inOrderTraversal(node-&gt;right);
        }
    }

public:
    InOrderIterator(shared_ptr&lt;TreeNode&lt;T&gt;&gt; root) : currentIndex(0) {
        inOrderTraversal(root);
    }

    bool hasNext() const override {
        return currentIndex &lt; elements.size();
    }

    T next() override {
        return elements[currentIndex++];
    }

    void reset() override {
        currentIndex = 0;
    }
};

// PreOrder Iterator (Root -&gt; Left -&gt; Right)
template&lt;typename T&gt;
class PreOrderIterator : public Iterator&lt;T&gt; {
private:
    vector&lt;T&gt; elements;
    int currentIndex;

    void preOrderTraversal(shared_ptr&lt;TreeNode&lt;T&gt;&gt; node) {
        if (node) {
            elements.push_back(node-&gt;data);
            preOrderTraversal(node-&gt;left);
            preOrderTraversal(node-&gt;right);
        }
    }

public:
    PreOrderIterator(shared_ptr&lt;TreeNode&lt;T&gt;&gt; root) : currentIndex(0) {
        preOrderTraversal(root);
    }

    bool hasNext() const override {
        return currentIndex &lt; elements.size();
    }

    T next() override {
        return elements[currentIndex++];
    }

    void reset() override {
        currentIndex = 0;
    }
};

template&lt;typename T&gt;
shared_ptr&lt;Iterator&lt;T&gt;&gt; BinaryTree&lt;T&gt;::createInOrderIterator() {
    return make_shared&lt;InOrderIterator&lt;T&gt;&gt;(root);
}

template&lt;typename T&gt;
shared_ptr&lt;Iterator&lt;T&gt;&gt; BinaryTree&lt;T&gt;::createPreOrderIterator() {
    return make_shared&lt;PreOrderIterator&lt;T&gt;&gt;(root);
}

// ============= Example 3: Social Media Feed =============

class Post {
private:
    string author;
    string content;
    int likes;

public:
    Post(const string&amp; a, const string&amp; c, int l = 0) 
        : author(a), content(c), likes(l) {}

    void display() const {
        cout &lt;&lt; author &lt;&lt; &quot;: &quot; &lt;&lt; content &lt;&lt; &quot; [&quot; &lt;&lt; likes &lt;&lt; &quot; likes]&quot; &lt;&lt; endl;
    }

    int getLikes() const { return likes; }
};

class SocialMediaFeed : public Collection&lt;Post&gt; {
private:
    vector&lt;Post&gt; posts;

public:
    void addPost(const Post&amp; post) {
        posts.push_back(post);
    }

    int size() const { return posts.size(); }
    Post&amp; getAt(int index) { return posts[index]; }

    shared_ptr&lt;Iterator&lt;Post&gt;&gt; createIterator() override;
    shared_ptr&lt;Iterator&lt;Post&gt;&gt; createReverseIterator();
    shared_ptr&lt;Iterator&lt;Post&gt;&gt; createPopularPostsIterator(int minLikes);

    friend class FeedIterator;
    friend class ReverseFeedIterator;
    friend class PopularPostsIterator;
};

// Forward Iterator
class FeedIterator : public Iterator&lt;Post&gt; {
private:
    SocialMediaFeed&amp; feed;
    int currentIndex;

public:
    FeedIterator(SocialMediaFeed&amp; f) : feed(f), currentIndex(0) {}

    bool hasNext() const override {
        return currentIndex &lt; feed.size();
    }

    Post next() override {
        return feed.getAt(currentIndex++);
    }

    void reset() override {
        currentIndex = 0;
    }
};

// Reverse Iterator
class ReverseFeedIterator : public Iterator&lt;Post&gt; {
private:
    SocialMediaFeed&amp; feed;
    int currentIndex;

public:
    ReverseFeedIterator(SocialMediaFeed&amp; f) : feed(f) {
        currentIndex = feed.size() - 1;
    }

    bool hasNext() const override {
        return currentIndex &gt;= 0;
    }

    Post next() override {
        return feed.getAt(currentIndex--);
    }

    void reset() override {
        currentIndex = feed.size() - 1;
    }
};

// Filtered Iterator (only popular posts)
class PopularPostsIterator : public Iterator&lt;Post&gt; {
private:
    SocialMediaFeed&amp; feed;
    int minLikes;
    int currentIndex;

    void findNext() {
        while (currentIndex &lt; feed.size() &amp;&amp; 
               feed.getAt(currentIndex).getLikes() &lt; minLikes) {
            currentIndex++;
        }
    }

public:
    PopularPostsIterator(SocialMediaFeed&amp; f, int likes) 
        : feed(f), minLikes(likes), currentIndex(0) {
        findNext();
    }

    bool hasNext() const override {
        return currentIndex &lt; feed.size();
    }

    Post next() override {
        Post post = feed.getAt(currentIndex++);
        findNext();
        return post;
    }

    void reset() override {
        currentIndex = 0;
        findNext();
    }
};

shared_ptr&lt;Iterator&lt;Post&gt;&gt; SocialMediaFeed::createIterator() {
    return make_shared&lt;FeedIterator&gt;(*this);
}

shared_ptr&lt;Iterator&lt;Post&gt;&gt; SocialMediaFeed::createReverseIterator() {
    return make_shared&lt;ReverseFeedIterator&gt;(*this);
}

shared_ptr&lt;Iterator&lt;Post&gt;&gt; SocialMediaFeed::createPopularPostsIterator(int minLikes) {
    return make_shared&lt;PopularPostsIterator&gt;(*this, minLikes);
}

<pre><code class="language-cpp">/*
 * MEDIATOR PATTERN - Behavioral Pattern
 * 
 * PURPOSE:
 * Defines an object that encapsulates how a set of objects interact.
 * Promotes loose coupling by keeping objects from referring to each other explicitly.
 * 
 * WHEN TO USE:
 * - Set of objects communicate in well-defined but complex ways
 * - Reusing object is difficult because it refers to many other objects
 * - Behavior distributed between classes should be customizable without subclassing
 * - Too many interconnections between objects
 * 
 * PROS:
 * + Reduces coupling between components
 * + Centralizes control logic
 * + Simplifies object protocols
 * + Easier to understand object interactions
 * + Single Responsibility Principle
 * + Open/Closed Principle
 * 
 * CONS:
 * - Mediator can become too complex (god object)
 * - Can be harder to maintain
 * 
 * REAL-WORLD EXAMPLES:
 * - Air traffic control (coordinates planes)
 * - Chat rooms (routes messages)
 * - GUI dialog boxes (coordinates widgets)
 * - Auction systems
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;vector&gt;
#include &lt;memory&gt;
#include &lt;algorithm&gt;

using namespace std;

// ============= Example 1: Chat Room =============

class User;

// Mediator interface
class ChatRoomMediator {
public:
    virtual ~ChatRoomMediator() = default;
    virtual void sendMessage(const string&amp; message, User* sender) = 0;
    virtual void addUser(User* user) = 0;
};

// Colleague
class User {
protected:
    string name;
    ChatRoomMediator* mediator;

public:
    User(const string&amp; n, ChatRoomMediator* med) : name(n), mediator(med) {}
    virtual ~User() = default;

    string getName() const { return name; }

    virtual void send(const string&amp; message) {
        cout &lt;&lt; name &lt;&lt; &quot; sends: &quot; &lt;&lt; message &lt;&lt; endl;
        mediator-&gt;sendMessage(message, this);
    }

    virtual void receive(const string&amp; message, const string&amp; from) {
        cout &lt;&lt; name &lt;&lt; &quot; receives from &quot; &lt;&lt; from &lt;&lt; &quot;: &quot; &lt;&lt; message &lt;&lt; endl;
    }
};

// Concrete Mediator
class ChatRoom : public ChatRoomMediator {
private:
    vector&lt;User*&gt; users;

public:
    void addUser(User* user) override {
        users.push_back(user);
        cout &lt;&lt; &quot;[ChatRoom] &quot; &lt;&lt; user-&gt;getName() &lt;&lt; &quot; joined the chat&quot; &lt;&lt; endl;
    }

    void sendMessage(const string&amp; message, User* sender) override {
        for (User* user : users) {
            // Don't send to self
            if (user != sender) {
                user-&gt;receive(message, sender-&gt;getName());
            }
        }
    }
};

// ============= Example 2: Air Traffic Control =============

class Aircraft;

// Mediator
class AirTrafficControl {
public:
    virtual ~AirTrafficControl() = default;
    virtual void registerAircraft(Aircraft* aircraft) = 0;
    virtual void requestLanding(Aircraft* aircraft) = 0;
    virtual void requestTakeoff(Aircraft* aircraft) = 0;
};

// Colleague
class Aircraft {
protected:
    string callSign;
    AirTrafficControl* atc;

public:
    Aircraft(const string&amp; sign, AirTrafficControl* control) 
        : callSign(sign), atc(control) {
        atc-&gt;registerAircraft(this);
    }

    virtual ~Aircraft() = default;

    string getCallSign() const { return callSign; }

    void requestLanding() {
        cout &lt;&lt; callSign &lt;&lt; &quot; requesting landing permission&quot; &lt;&lt; endl;
        atc-&gt;requestLanding(this);
    }

    void requestTakeoff() {
        cout &lt;&lt; callSign &lt;&lt; &quot; requesting takeoff permission&quot; &lt;&lt; endl;
        atc-&gt;requestTakeoff(this);
    }

    virtual void receivePermission(const string&amp; instruction) {
        cout &lt;&lt; callSign &lt;&lt; &quot; received: &quot; &lt;&lt; instruction &lt;&lt; endl;
    }
};

// Concrete Mediator
class ControlTower : public AirTrafficControl {
private:
    vector&lt;Aircraft*&gt; aircrafts;
    bool runwayAvailable;

public:
    ControlTower() : runwayAvailable(true) {}

    void registerAircraft(Aircraft* aircraft) override {
        aircrafts.push_back(aircraft);
        cout &lt;&lt; &quot;[Tower] &quot; &lt;&lt; aircraft-&gt;getCallSign() &lt;&lt; &quot; registered&quot; &lt;&lt; endl;
    }

    void requestLanding(Aircraft* aircraft) override {
        if (runwayAvailable) {
            runwayAvailable = false;
            aircraft-&gt;receivePermission(&quot;Cleared to land on Runway 27&quot;);
            // Notify others
            for (Aircraft* other : aircrafts) {
                if (other != aircraft) {
                    other-&gt;receivePermission(&quot;Hold position, runway occupied&quot;);
                }
            }
        } else {
            aircraft-&gt;receivePermission(&quot;Negative, runway occupied. Hold at 5000ft&quot;);
        }
    }

    void requestTakeoff(Aircraft* aircraft) override {
        if (runwayAvailable) {
            runwayAvailable = false;
            aircraft-&gt;receivePermission(&quot;Cleared for takeoff, Runway 27&quot;);
        } else {
            aircraft-&gt;receivePermission(&quot;Negative, runway occupied. Hold short&quot;);
        }
    }

    void releaseRunway() {
        runwayAvailable = true;
        cout &lt;&lt; &quot;[Tower] Runway is now available&quot; &lt;&lt; endl;
    }
};

class Widget;

// Mediator
class DialogMediator {
public:
    virtual ~DialogMediator() = default;
    virtual void notify(Widget* sender, const string&amp; event) = 0;
};

// Colleague
class Widget {
protected:
    string name;
    DialogMediator* mediator;

public:
    Widget(const string&amp; n, DialogMediator* med) : name(n), mediator(med) {}
    virtual ~Widget() = default;

    string getName() const { return name; }

    virtual void click() = 0;
    virtual void enable() = 0;
    virtual void disable() = 0;
};

// Concrete Colleagues
class Button : public Widget {
private:
    bool enabled;

public:
    Button(const string&amp; n, DialogMediator* med) 
        : Widget(n, med), enabled(true) {}

    void click() override {
        if (enabled) {
            cout &lt;&lt; &quot;Button '&quot; &lt;&lt; name &lt;&lt; &quot;' clicked&quot; &lt;&lt; endl;
            mediator-&gt;notify(this, &quot;click&quot;);
        }
    }

    void enable() override {
        enabled = true;
        cout &lt;&lt; &quot;Button '&quot; &lt;&lt; name &lt;&lt; &quot;' enabled&quot; &lt;&lt; endl;
    }

    void disable() override {
        enabled = false;
        cout &lt;&lt; &quot;Button '&quot; &lt;&lt; name &lt;&lt; &quot;' disabled&quot; &lt;&lt; endl;
    }
};

class Checkbox : public Widget {
private:
    bool checked;

public:
    Checkbox(const string&amp; n, DialogMediator* med) 
        : Widget(n, med), checked(false) {}

    void click() override {
        checked = !checked;
        cout &lt;&lt; &quot;Checkbox '&quot; &lt;&lt; name &lt;&lt; &quot;' is now &quot; 
             &lt;&lt; (checked ? &quot;checked&quot; : &quot;unchecked&quot;) &lt;&lt; endl;
        mediator-&gt;notify(this, checked ? &quot;checked&quot; : &quot;unchecked&quot;);
    }

    void enable() override {
        cout &lt;&lt; &quot;Checkbox '&quot; &lt;&lt; name &lt;&lt; &quot;' enabled&quot; &lt;&lt; endl;
    }

    void disable() override {
        cout &lt;&lt; &quot;Checkbox '&quot; &lt;&lt; name &lt;&lt; &quot;' disabled&quot; &lt;&lt; endl;
    }

    bool isChecked() const { return checked; }
};

class TextBox : public Widget {
private:
    string text;
    bool enabled;

public:
    TextBox(const string&amp; n, DialogMediator* med) 
        : Widget(n, med), enabled(true) {}

    void click() override {
        if (enabled) {
            cout &lt;&lt; &quot;TextBox '&quot; &lt;&lt; name &lt;&lt; &quot;' focused&quot; &lt;&lt; endl;
        }
    }

    void enable() override {
        enabled = true;
        cout &lt;&lt; &quot;TextBox '&quot; &lt;&lt; name &lt;&lt; &quot;' enabled&quot; &lt;&lt; endl;
    }

    void disable() override {
        enabled = false;
        text = &quot;&quot;;
        cout &lt;&lt; &quot;TextBox '&quot; &lt;&lt; name &lt;&lt; &quot;' disabled and cleared&quot; &lt;&lt; endl;
    }

    void setText(const string&amp; t) { text = t; }
    string getText() const { return text; }
};

// Concrete Mediator
class LoginDialog : public DialogMediator {
private:
    Checkbox* rememberMe;
    Button* loginButton;
    Button* cancelButton;
    TextBox* usernameBox;
    TextBox* passwordBox;

public:
    LoginDialog() {
        rememberMe = new Checkbox(&quot;Remember Me&quot;, this);
        loginButton = new Button(&quot;Login&quot;, this);
        cancelButton = new Button(&quot;Cancel&quot;, this);
        usernameBox = new TextBox(&quot;Username&quot;, this);
        passwordBox = new TextBox(&quot;Password&quot;, this);
    }

    ~LoginDialog() {
        delete rememberMe;
        delete loginButton;
        delete cancelButton;
        delete usernameBox;
        delete passwordBox;
    }

    void notify(Widget* sender, const string&amp; event) override {
        cout &lt;&lt; &quot;[Dialog] Handling event: &quot; &lt;&lt; event 
             &lt;&lt; &quot; from &quot; &lt;&lt; sender-&gt;getName() &lt;&lt; endl;

        // Coordinate behavior between widgets
        if (sender == rememberMe &amp;&amp; event == &quot;checked&quot;) {
            cout &lt;&lt; &quot;[Dialog] Remember Me enabled - future logins will be saved&quot; &lt;&lt; endl;
        }
        else if (sender == rememberMe &amp;&amp; event == &quot;unchecked&quot;) {
            cout &lt;&lt; &quot;[Dialog] Remember Me disabled&quot; &lt;&lt; endl;
        }
        else if (sender == loginButton &amp;&amp; event == &quot;click&quot;) {
            cout &lt;&lt; &quot;[Dialog] Processing login...&quot; &lt;&lt; endl;
            if (rememberMe-&gt;isChecked()) {
                cout &lt;&lt; &quot;[Dialog] Saving credentials for future use&quot; &lt;&lt; endl;
            }
        }
        else if (sender == cancelButton &amp;&amp; event == &quot;click&quot;) {
            cout &lt;&lt; &quot;[Dialog] Login cancelled - clearing fields&quot; &lt;&lt; endl;
            usernameBox-&gt;disable();
            passwordBox-&gt;disable();
        }
    }

    void show() {
        cout &lt;&lt; &quot;\\n[Dialog] Showing login dialog&quot; &lt;&lt; endl;
        cout &lt;&lt; &quot;Components: &quot; &lt;&lt; endl;
        cout &lt;&lt; &quot;  - Username field&quot; &lt;&lt; endl;
        cout &lt;&lt; &quot;  - Password field&quot; &lt;&lt; endl;
        cout &lt;&lt; &quot;  - Remember Me checkbox&quot; &lt;&lt; endl;
        cout &lt;&lt; &quot;  - Login button&quot; &lt;&lt; endl;
        cout &lt;&lt; &quot;  - Cancel button&quot; &lt;&lt; endl;
    }

    Button* getLoginButton() { return loginButton; }
    Button* getCancelButton() { return cancelButton; }
    Checkbox* getRememberMeCheckbox() { return rememberMe; }
};

<pre><code class="language-cpp">/*
 * MEMENTO PATTERN - Behavioral Pattern
 * 
 * PURPOSE:
 * Captures and externalizes an object's internal state so it can be restored later,
 * without violating encapsulation.
 * 
 * WHEN TO USE:
 * - Need to save/restore object state (undo/redo, snapshots)
 * - Direct access to state would expose implementation details
 * - Want to provide rollback capability
 * 
 * PROS:
 * + Preserves encapsulation boundaries
 * + Simplifies originator (state management extracted)
 * + Can implement undo/redo functionality
 * 
 * CONS:
 * - Can be expensive if originator's state is large
 * - Caretaker must track memento lifecycle
 * - May require lots of memory for multiple snapshots
 * 
 * REAL-WORLD EXAMPLES:
 * - Text editor undo/redo
 * - Game save states
 * - Database transactions (rollback)
 * - Version control systems
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;vector&gt;
#include &lt;memory&gt;
#include &lt;ctime&gt;

using namespace std;

// ============= Example 1: Text Editor =============

// Memento - stores state
class EditorMemento {
private:
    string content;
    int cursorPosition;
    string timestamp;

    // Only Originator can access private members
    friend class TextEditor;

public:
    EditorMemento(const string&amp; cont, int pos) 
        : content(cont), cursorPosition(pos) {
        time_t now = time(0);
        timestamp = ctime(&amp;now);
    }

    string getTimestamp() const { return timestamp; }
};

// Originator
class TextEditor {
private:
    string content;
    int cursorPosition;

public:
    TextEditor() : content(&quot;&quot;), cursorPosition(0) {}

    void type(const string&amp; text) {
        content += text;
        cursorPosition = content.length();
        cout &lt;&lt; &quot;Typed: \\&quot;&quot; &lt;&lt; text &lt;&lt; &quot;\\&quot;&quot; &lt;&lt; endl;
    }

    void deleteLast(int count) {
        if (count &lt;= content.length()) {
            content = content.substr(0, content.length() - count);
            cursorPosition = content.length();
            cout &lt;&lt; &quot;Deleted last &quot; &lt;&lt; count &lt;&lt; &quot; characters&quot; &lt;&lt; endl;
        }
    }

    void display() const {
        cout &lt;&lt; &quot;Content: \\&quot;&quot; &lt;&lt; content &lt;&lt; &quot;\\&quot; (cursor at &quot; 
             &lt;&lt; cursorPosition &lt;&lt; &quot;)&quot; &lt;&lt; endl;
    }

    // Create memento
    shared_ptr&lt;EditorMemento&gt; save() {
        cout &lt;&lt; &quot;Saving state...&quot; &lt;&lt; endl;
        return make_shared&lt;EditorMemento&gt;(content, cursorPosition);
    }

    // Restore from memento
    void restore(shared_ptr&lt;EditorMemento&gt; memento) {
        content = memento-&gt;content;
        cursorPosition = memento-&gt;cursorPosition;
        cout &lt;&lt; &quot;Restored state from &quot; &lt;&lt; memento-&gt;getTimestamp();
    }
};

// Caretaker
class History {
private:
    vector&lt;shared_ptr&lt;EditorMemento&gt;&gt; mementos;

public:
    void addMemento(shared_ptr&lt;EditorMemento&gt; memento) {
        mementos.push_back(memento);
    }

    shared_ptr&lt;EditorMemento&gt; getMemento(int index) {
        if (index &gt;= 0 &amp;&amp; index &lt; mementos.size()) {
            return mementos[index];
        }
        return nullptr;
    }

    int getHistorySize() const {
        return mementos.size();
    }
};

// ============= Example 2: Game Save System =============

class GameMemento {
private:
    int level;
    int health;
    int score;
    string playerName;

    friend class Game;

public:
    GameMemento(int lvl, int hp, int sc, const string&amp; name)
        : level(lvl), health(hp), score(sc), playerName(name) {}
};

class Game {
private:
    string playerName;
    int level;
    int health;
    int score;

public:
    Game(const string&amp; name) : playerName(name), level(1), health(100), score(0) {}

    void play() {
        level++;
        score += 100;
        health -= 20;
        cout &lt;&lt; &quot;Playing... Level &quot; &lt;&lt; level &lt;&lt; &quot; completed!&quot; &lt;&lt; endl;
    }

    void takeDamage(int damage) {
        health -= damage;
        cout &lt;&lt; &quot;Took &quot; &lt;&lt; damage &lt;&lt; &quot; damage!&quot; &lt;&lt; endl;
    }

    void displayStatus() const {
        cout &lt;&lt; &quot;\\n=== Game Status ===&quot; &lt;&lt; endl;
        cout &lt;&lt; &quot;Player: &quot; &lt;&lt; playerName &lt;&lt; endl;
        cout &lt;&lt; &quot;Level: &quot; &lt;&lt; level &lt;&lt; endl;
        cout &lt;&lt; &quot;Health: &quot; &lt;&lt; health &lt;&lt; endl;
        cout &lt;&lt; &quot;Score: &quot; &lt;&lt; score &lt;&lt; endl;
    }

    shared_ptr&lt;GameMemento&gt; saveGame() {
        cout &lt;&lt; &quot;Saving game...&quot; &lt;&lt; endl;
        return make_shared&lt;GameMemento&gt;(level, health, score, playerName);
    }

    void loadGame(shared_ptr&lt;GameMemento&gt; save) {
        level = save-&gt;level;
        health = save-&gt;health;
        score = save-&gt;score;
        playerName = save-&gt;playerName;
        cout &lt;&lt; &quot;Game loaded!&quot; &lt;&lt; endl;
    }
};

// Caretaker
class SaveManager {
private:
    vector&lt;shared_ptr&lt;GameMemento&gt;&gt; saves;

public:
    void save(shared_ptr&lt;GameMemento&gt; memento) {
        saves.push_back(memento);
        cout &lt;&lt; &quot;Save slot &quot; &lt;&lt; saves.size() &lt;&lt; &quot; created&quot; &lt;&lt; endl;
    }

    shared_ptr&lt;GameMemento&gt; load(int slot) {
        if (slot &gt; 0 &amp;&amp; slot &lt;= saves.size()) {
            cout &lt;&lt; &quot;Loading save slot &quot; &lt;&lt; slot &lt;&lt; endl;
            return saves[slot - 1];
        }
        cout &lt;&lt; &quot;Invalid save slot!&quot; &lt;&lt; endl;
        return nullptr;
    }

    void listSaves() const {
        cout &lt;&lt; &quot;\\nAvailable saves: &quot; &lt;&lt; saves.size() &lt;&lt; endl;
        for (size_t i = 0; i &lt; saves.size(); i++) {
            cout &lt;&lt; &quot;  Slot &quot; &lt;&lt; (i + 1) &lt;&lt; endl;
        }
    }
};

class Configuration {

    }

    void setFontSize(int size) {

    }

    void setLanguage(const string&amp; lang) {

    }

    void display() const {

        cout &lt;&lt; &quot;Language: &quot; &lt;&lt; language &lt;&lt; endl;
    }

    shared_ptr&lt;ConfigMemento&gt; createSnapshot() {
        return make_shared&lt;ConfigMemento&gt;(theme, fontSize, autoSave, language);
    }

    void restoreSnapshot(shared_ptr&lt;ConfigMemento&gt; snapshot) {
        theme = snapshot-&gt;theme;
        fontSize = snapshot-&gt;fontSize;
        autoSave = snapshot-&gt;autoSave;
        language = snapshot-&gt;language;
        cout &lt;&lt; &quot;Configuration restored from snapshot&quot; &lt;&lt; endl;
    }
};

class ConfigHistory {
private:
    vector&lt;shared_ptr&lt;ConfigMemento&gt;&gt; snapshots;
    int currentIndex;

public:
    ConfigHistory() : currentIndex(-1) {}

    void saveSnapshot(shared_ptr&lt;ConfigMemento&gt; snapshot) {
        // Remove any snapshots after current index
        if (currentIndex &lt; snapshots.size() - 1) {
            snapshots.erase(snapshots.begin() + currentIndex + 1, snapshots.end());
        }

        snapshots.push_back(snapshot);
        currentIndex++;
        cout &lt;&lt; &quot;Snapshot &quot; &lt;&lt; (currentIndex + 1) &lt;&lt; &quot; saved&quot; &lt;&lt; endl;
    }

    shared_ptr&lt;ConfigMemento&gt; undo() {
        if (currentIndex &gt; 0) {
            currentIndex--;
            return snapshots[currentIndex];
        }
        cout &lt;&lt; &quot;Nothing to undo&quot; &lt;&lt; endl;
        return nullptr;
    }

    shared_ptr&lt;ConfigMemento&gt; redo() {
        if (currentIndex &lt; snapshots.size() - 1) {
            currentIndex++;
            return snapshots[currentIndex];
        }
        cout &lt;&lt; &quot;Nothing to redo&quot; &lt;&lt; endl;
        return nullptr;
    }
};

<pre><code class="language-cpp">/*
 * OBSERVER PATTERN - Behavioral Pattern
 * 
 * PURPOSE:
 * Defines a one-to-many dependency between objects so that when one object
 * changes state, all its dependents are notified and updated automatically.
 * 
 * WHEN TO USE:
 * - Change to one object requires changing others (unknown how many)
 * - Object should notify others without making assumptions about who they are
 * - Want loose coupling between subject and observers
 * 
 * PROS:
 * + Open/Closed Principle: can add new subscribers without modifying publisher
 * + Establishes relationships at runtime
 * + Loose coupling between subject and observers
 * + Supports broadcast communication
 * 
 * CONS:
 * - Observers notified in random order
 * - Can cause memory leaks if not unsubscribed properly
 * - Can be hard to debug
 * 
 * REAL-WORLD EXAMPLES:
 * - Event handling systems (GUI, event listeners)
 * - Model-View-Controller (MVC) pattern
 * - Stock market price updates
 * - Social media notifications
 */

#include &lt;iostream&gt;
#include &lt;string&gt;
#include &lt;vector&gt;
#include &lt;algorithm&gt;
#include &lt;memory&gt;

using namespace std;

// ============= Example 1: Weather Station =============

// Observer interface
class Observer {
public:
    virtual ~Observer() = default;
    virtual void update(float temperature, float humidity, float pressure) = 0;
};

// Subject interface
class Subject {
public:
    virtual ~Subject() = default;
    virtual void attach(shared_ptr&lt;Observer&gt; observer) = 0;
    virtual void detach(shared_ptr&lt;Observer&gt; observer) = 0;
    virtual void notify() = 0;
};

// Concrete Subject
class WeatherStation : public Subject {
private:
    vector&lt;shared_ptr&lt;Observer&gt;&gt; observers;
    float temperature;
    float humidity;
    float pressure;

public:
    void attach(shared_ptr&lt;Observer&gt; observer) override {
        observers.push_back(observer);
        cout &lt;&lt; &quot;Observer attached to weather station&quot; &lt;&lt; endl;
    }

    void detach(shared_ptr&lt;Observer&gt; observer) override {
        auto it = find(observers.begin(), observers.end(), observer);
        if (it != observers.end()) {
            observers.erase(it);
            cout &lt;&lt; &quot;Observer detached from weather station&quot; &lt;&lt; endl;
        }
    }

    void notify() override {
        cout &lt;&lt; &quot;\\n[Weather Station] Notifying all observers...&quot; &lt;&lt; endl;
        for (auto&amp; observer : observers) {
            observer-&gt;update(temperature, humidity, pressure);
        }
    }

    void setMeasurements(float temp, float hum, float press) {
        cout &lt;&lt; &quot;\\n[Weather Station] New measurements received&quot; &lt;&lt; endl;
        temperature = temp;
        humidity = hum;
        pressure = press;
        notify();
    }
};

// Concrete Observers
class CurrentConditionsDisplay : public Observer {
public:
    void update(float temperature, float humidity, float pressure) override {
        cout &lt;&lt; &quot;[Current Conditions Display]&quot; &lt;&lt; endl;
        cout &lt;&lt; &quot;  Temperature: &quot; &lt;&lt; temperature &lt;&lt; &quot;°C&quot; &lt;&lt; endl;
        cout &lt;&lt; &quot;  Humidity: &quot; &lt;&lt; humidity &lt;&lt; &quot;%&quot; &lt;&lt; endl;
    }
};

class StatisticsDisplay : public Observer {
private:
    float maxTemp = 0;
    float minTemp = 100;
    float tempSum = 0;
    int numReadings = 0;

public:
    void update(float temperature, float humidity, float pressure) override {
        tempSum += temperature;
        numReadings++;

        if (temperature &gt; maxTemp) maxTemp = temperature;
        if (temperature &lt; minTemp) minTemp = temperature;

        cout &lt;&lt; &quot;[Statistics Display]&quot; &lt;&lt; endl;
        cout &lt;&lt; &quot;  Avg Temperature: &quot; &lt;&lt; (tempSum / numReadings) &lt;&lt; &quot;°C&quot; &lt;&lt; endl;
        cout &lt;&lt; &quot;  Max Temperature: &quot; &lt;&lt; maxTemp &lt;&lt; &quot;°C&quot; &lt;&lt; endl;
        cout &lt;&lt; &quot;  Min Temperature: &quot; &lt;&lt; minTemp &lt;&lt; &quot;°C&quot; &lt;&lt; endl;
    }
};

class ForecastDisplay : public Observer {
private:
    float lastPressure = 1013;

public:
    void update(float temperature, float humidity, float pressure) override {
        cout &lt;&lt; &quot;[Forecast Display]&quot; &lt;&lt; endl;
        if (pressure &gt; lastPressure) {
            cout &lt;&lt; &quot;  Improving weather on the way!&quot; &lt;&lt; endl;
        } else if (pressure &lt; lastPressure) {
            cout &lt;&lt; &quot;  Watch out for cooler, rainy weather&quot; &lt;&lt; endl;
        } else {
            cout &lt;&lt; &quot;  More of the same&quot; &lt;&lt; endl;
        }
        lastPressure = pressure;
    }
};

// ============= Example 2: Stock Market =============

class StockObserver {
public:
    virtual ~StockObserver() = default;
    virtual void update(const string&amp; symbol, double price) = 0;
};

class Stock {
private:
    string symbol;
    double price;
    vector&lt;shared_ptr&lt;StockObserver&gt;&gt; observers;

public:
    Stock(const string&amp; sym, double initialPrice) 
        : symbol(sym), price(initialPrice) {}

    void subscribe(shared_ptr&lt;StockObserver&gt; observer) {
        observers.push_back(observer);
    }

    void unsubscribe(shared_ptr&lt;StockObserver&gt; observer) {
        auto it = find(observers.begin(), observers.end(), observer);
        if (it != observers.end()) {
            observers.erase(it);
        }
    }

    void setPrice(double newPrice) {
        if (newPrice != price) {
            price = newPrice;
            cout &lt;&lt; &quot;\\n[&quot; &lt;&lt; symbol &lt;&lt; &quot;] Price changed to $&quot; &lt;&lt; price &lt;&lt; endl;
            notifyObservers();
        }
    }

    double getPrice() const { return price; }
    string getSymbol() const { return symbol; }

private:
    void notifyObservers() {
        for (auto&amp; observer : observers) {
            observer-&gt;update(symbol, price);
        }
    }
};

class Investor : public StockObserver {
private:
    string name;
    double buyThreshold;
    double sellThreshold;

public:
    Investor(const string&amp; n, double buy, double sell)
        : name(n), buyThreshold(buy), sellThreshold(sell) {}

            cout &lt;&lt; &quot;SELL signal for &quot; &lt;&lt; symbol &lt;&lt; &quot; at $&quot; &lt;&lt; price &lt;&lt; endl;
        } else {
            cout &lt;&lt; &quot;HOLD &quot; &lt;&lt; symbol &lt;&lt; &quot; at $&quot; &lt;&lt; price &lt;&lt; endl;
        }
    }
};

class StockAnalyzer : public StockObserver {

        cout &lt;&lt; &quot;[Stock Analyzer] Analyzing &quot; &lt;&lt; symbol 
             &lt;&lt; &quot; - Current price: $&quot; &lt;&lt; price &lt;&lt; endl;

// ============= Example 3: Newsletter System =============

class Subscriber {
public:
    virtual ~Subscriber() = default;
    virtual void notify(const string&amp; article) = 0;
    virtual string getEmail() const = 0;
};

class Newsletter {
private:
    vector&lt;shared_ptr&lt;Subscriber&gt;&gt; subscribers;
    string latestArticle;

public:
    void subscribe(shared_ptr&lt;Subscriber&gt; subscriber) {
        subscribers.push_back(subscriber);
        cout &lt;&lt; subscriber-&gt;getEmail() &lt;&lt; &quot; subscribed to newsletter&quot; &lt;&lt; endl;
    }

    void unsubscribe(shared_ptr&lt;Subscriber&gt; subscriber) {
        auto it = find(subscribers.begin(), subscribers.end(), subscriber);
        if (it != subscribers.end()) {
            subscribers.erase(it);
            cout &lt;&lt; subscriber-&gt;getEmail() &lt;&lt; &quot; unsubscribed from newsletter&quot; &lt;&lt; endl;
        }
    }

    void publishArticle(const string&amp; article) {
        cout &lt;&lt; &quot;\\n[Newsletter] Publishing new article...&quot; &lt;&lt; endl;
        latestArticle = article;
        notifySubscribers();
    }

private:
    void notifySubscribers() {
        for (auto&amp; subscriber : subscribers) {
            subscriber-&gt;notify(latestArticle);
        }
    }
};

class EmailSubscriber : public Subscriber {
private:
    string email;

public:
    EmailSubscriber(const string&amp; e) : email(e) {}

    void notify(const string&amp; article) override {
        cout &lt;&lt; &quot;[Email to &quot; &lt;&lt; email &lt;&lt; &quot;] New article: &quot; &lt;&lt; article &lt;&lt; endl;
    }

    string getEmail() const override { return email; }
};

class SMSSubscriber : public Subscriber {
private:
    string phoneNumber;

public:
    SMSSubscriber(const string&amp; phone) : phoneNumber(phone) {}

    void notify(const string&amp; article) override {
        cout &lt;&lt; &quot;[SMS to &quot; &lt;&lt; phoneNumber &lt;&lt; &quot;] New article published&quot; &lt;&lt; endl;
    }

    string getEmail() const override { return phoneNumber; }
};
